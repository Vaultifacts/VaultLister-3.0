userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

framework: playwright

buildName: VaultLister Mobile Audit
projectName: "VaultLister"

parallelsPerPlatform: 1

platforms:
  - os: Windows
    osVersion: 11
    browserName: chrome
    browserVersion: latest

  - os: Windows
    osVersion: 11
    browserName: firefox
    browserVersion: latest

  - os: Windows
    osVersion: 11
    browserName: edge
    browserVersion: latest

  - os: OS X
    osVersion: Sonoma
    browserName: safari
    browserVersion: 17.4

  - os: ios
    osVersion: 17
    browserName: safari
    deviceName: iPhone 15

  - os: android
    osVersion: 14.0
    browserName: chrome
    deviceName: Samsung Galaxy S24

  - os: android
    osVersion: 13.0
    browserName: chrome
    deviceName: Google Pixel 7

# Testing against live Railway deployment — no local tunnel needed
browserstackLocal: false

playwrightConfigOptions:
  timeout: 60000

captureScreenshots: true
networkLogs: false
consoleLogs: "errors"
testReporting: true
