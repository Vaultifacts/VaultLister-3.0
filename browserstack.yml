userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

framework: playwright

buildName: VaultLister Mobile Audit
projectName: "VaultLister"

parallelsPerPlatform: 1

platforms:
  - os: ios
    osVersion: 16
    browserName: safari
    deviceName: iPhone 14 Pro

  - os: Windows
    osVersion: 11
    browserName: chrome
    browserVersion: latest

# Testing against live Railway deployment — no local tunnel needed
browserstackLocal: false

playwrightConfigOptions:
  timeout: 60000

captureScreenshots: true
networkLogs: false
consoleLogs: "errors"
testReporting: true
