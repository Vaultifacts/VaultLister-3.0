# VaultLister Docker Compose Configuration
# For local development and production deployment

services:
  # ============================================
  # VaultLister Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaultlister-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      # OAuth (optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@vaultlister.com}
      # AI (optional)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Proxy trust (required for correct IP-based rate limiting behind Nginx)
      - TRUST_PROXY=1
    volumes:
      - vaultlister-data:/app/data
      - vaultlister-logs:/app/logs
      - vaultlister-backups:/app/backups
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health',{signal:AbortSignal.timeout(5000)}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vaultlister-network

  # ============================================
  # Redis (for caching and sessions)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: vaultlister-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaultlister-network

  # ============================================
  # Nginx (reverse proxy, optional)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: vaultlister-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - vaultlister-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - vaultlister-network
    profiles:
      - production

  # ============================================
  # Backup Scheduler (automated daily backups, production profile)
  # Runs an immediate backup on start, then every 24 hours.
  # ============================================
  backup-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaultlister-backup-scheduler
    restart: unless-stopped
    entrypoint: ["sh", "-c", "bun run scripts/backup.js --compress; while true; do sleep 86400; bun run scripts/backup.js --compress; done"]
    environment:
      - DATA_DIR=/app/data
      - BACKUP_DIR=/app/backups
      - ONEDRIVE_ENABLED=${ONEDRIVE_ENABLED:-false}
    volumes:
      - vaultlister-data:/app/data:ro
      - vaultlister-backups:/app/backups
    depends_on:
      app:
        condition: service_healthy
    networks:
      - vaultlister-network
    profiles:
      - production

  # ============================================
  # Backup Service (manual — use: docker compose --profile backup run backup)
  # ============================================
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaultlister-backup
    restart: "no"
    entrypoint: ["bun", "run", "scripts/backup.js", "--compress"]
    environment:
      - DATA_DIR=/app/data
      - BACKUP_DIR=/app/backups
      - ONEDRIVE_ENABLED=${ONEDRIVE_ENABLED:-false}
    volumes:
      - vaultlister-data:/app/data:ro
      - vaultlister-backups:/app/backups
    networks:
      - vaultlister-network
    profiles:
      - backup

# ============================================
# Volumes
# ============================================
volumes:
  vaultlister-data:
    driver: local
  vaultlister-logs:
    driver: local
  vaultlister-backups:
    driver: local
  redis-data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  vaultlister-network:
    driver: bridge
