# VaultLister Docker Compose Configuration
# For local development and production deployment

services:
  # ============================================
  # VaultLister Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaultlister-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - OAUTH_ENCRYPTION_KEY=${OAUTH_ENCRYPTION_KEY:?OAUTH_ENCRYPTION_KEY must be set}
      - DATABASE_URL=postgresql://vaultlister:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/vaultlister
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      # OAuth (optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@vaultlister.com}
      # AI (optional)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      # Push notifications (VAPID)
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@vaultlister.com}
      # Domain / URLs
      - BASE_URL=${BASE_URL:-https://vaultlister.com}
      - APP_URL=${APP_URL:-https://vaultlister.com}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://vaultlister.com}
      - RP_ID=${RP_ID:-vaultlister.com}
      - ORIGIN=${ORIGIN:-https://vaultlister.com}
      # OAuth
      - OAUTH_MODE=${OAUTH_MODE:-real}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI:-https://vaultlister.com/oauth-callback}
      - EBAY_ENVIRONMENT=${EBAY_ENVIRONMENT:-production}
      - EBAY_CLIENT_ID=${EBAY_CLIENT_ID:-}
      - EBAY_CLIENT_SECRET=${EBAY_CLIENT_SECRET:-}
      - EBAY_REDIRECT_URI=${EBAY_REDIRECT_URI:-}
      - EBAY_DELETION_VERIFICATION_TOKEN=${EBAY_DELETION_VERIFICATION_TOKEN:-}
      - EBAY_DELETION_ENDPOINT=${EBAY_DELETION_ENDPOINT:-}
      # Stripe (optional)
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # Proxy trust (required for correct IP-based rate limiting behind Nginx)
      - TRUST_PROXY=1
    volumes:
      - vaultlister-data:/app/data
      - vaultlister-logs:/app/logs
      - vaultlister-backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health',{signal:AbortSignal.timeout(5000)}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 60s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - vaultlister-network

  # ============================================
  # PostgreSQL (primary database)
  # ============================================
  postgres:
    image: postgres:17-alpine
    container_name: vaultlister-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=vaultlister
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=vaultlister
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultlister -d vaultlister"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - vaultlister-network

  # ============================================
  # Redis (for caching and sessions)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: vaultlister-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - vaultlister-network

  # ============================================
  # BullMQ Worker (Playwright automation bots)
  # ============================================
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: vaultlister-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://vaultlister:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/vaultlister
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - vaultlister-data:/app/data
      - vaultlister-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bun worker/index.js' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - vaultlister-network

  # ============================================
  # Nginx (reverse proxy, optional)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: vaultlister-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - letsencrypt-data:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
      - ./public:/app/public:ro
      - vaultlister-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - vaultlister-network
    profiles:
      - production

  # ============================================
  # Certbot (auto-renewal every 12 hours)
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: vaultlister-certbot
    restart: unless-stopped
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 43200; done"
    volumes:
      - letsencrypt-data:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    networks:
      - vaultlister-network
    profiles:
      - production

  # ============================================
  # Backup Scheduler (automated daily backups, production profile)
  # Runs an immediate backup on start, then every 24 hours.
  # ============================================
  backup-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaultlister-backup-scheduler
    restart: unless-stopped
    entrypoint: ["sh", "-c", "bun run scripts/pg-backup.js; while true; do sleep 86400; bun run scripts/pg-backup.js; done"]
    environment:
      - DATA_DIR=/app/data
      - BACKUP_DIR=/app/backups
      - CLOUD_BACKUP_ENABLED=${CLOUD_BACKUP_ENABLED:-false}
      - VAULTLISTER_RCLONE_REMOTE=${VAULTLISTER_RCLONE_REMOTE:-vaultlister-backup}
      - VAULTLISTER_REMOTE_PATH=${VAULTLISTER_REMOTE_PATH:-VaultLister/Backups}
      - RCLONE_PATH=/usr/bin/rclone
    volumes:
      - vaultlister-data:/app/data:ro
      - vaultlister-backups:/app/backups
      - ${RCLONE_CONFIG_DIR:-/root/.config/rclone}:/root/.config/rclone:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - vaultlister-network
    profiles:
      - production

  # ============================================
  # Backup Service (manual — use: docker compose --profile backup run backup)
  # ============================================
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaultlister-backup
    restart: "no"
    entrypoint: ["bun", "run", "scripts/pg-backup.js", "--compress"]
    environment:
      - DATA_DIR=/app/data
      - BACKUP_DIR=/app/backups
      - ONEDRIVE_ENABLED=${ONEDRIVE_ENABLED:-false}
    volumes:
      - vaultlister-data:/app/data:ro
      - vaultlister-backups:/app/backups
    networks:
      - vaultlister-network
    profiles:
      - backup

# ============================================
# Volumes
# ============================================
volumes:
  vaultlister-data:
    driver: local
  vaultlister-logs:
    driver: local
  vaultlister-backups:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  letsencrypt-data:
    driver: local
  certbot-webroot:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  vaultlister-network:
    driver: bridge
