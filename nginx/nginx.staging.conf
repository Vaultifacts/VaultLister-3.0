# VaultLister Nginx — Staging Configuration
# Listens on :80 and :443 inside the container
# (mapped to host ports 8080/8443 in docker-compose.staging.yml)
# Upstream app listens on port 3000 inside the staging network.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Rate limiting — relaxed for staging
    limit_req_zone $binary_remote_addr zone=api_staging:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=auth_staging:10m rate=10r/s;

    # Upstream — app container in staging network
    upstream vaultlister_staging {
        server app:3000;
        keepalive 32;
    }

    # HTTP — redirect to HTTPS
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            if ($host = 'www.vaultlister.com') {
                return 301 https://vaultlister.com$request_uri;
            }
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — staging
    server {
        listen 443 ssl;
        http2 on;
        server_name vaultlister.com www.vaultlister.com;

        ssl_certificate /etc/letsencrypt/live/vaultlister.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vaultlister.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL_STAGING:5m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/vaultlister.com/chain.pem;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # www → non-www canonical redirect
        if ($host = 'www.vaultlister.com') {
            return 301 https://vaultlister.com$request_uri;
        }

        keepalive_timeout 65;

        # Staging banner header so callers know which environment they hit
        add_header X-Environment "staging" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Auth — slightly relaxed for staging QA
        location ~ ^/api/auth/ {
            limit_req zone=auth_staging burst=20 nodelay;
            proxy_pass http://vaultlister_staging;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Request-ID $request_id always;
        }

        # API
        location /api/ {
            limit_req zone=api_staging burst=100 nodelay;
            proxy_pass http://vaultlister_staging;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Request-ID $request_id always;
            proxy_read_timeout 30s;
        }

        # WebSocket
        location /ws {
            proxy_pass http://vaultlister_staging;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Request-ID $request_id always;
            proxy_read_timeout 86400s;
        }

        # Health check — no rate limit, no access log
        location = /api/health {
            proxy_pass http://vaultlister_staging;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;
        }

        # Custom error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /404.html { root /app/public; internal; }
        location = /50x.html { root /app/public; internal; }

        # Favicon redirect
        location = /favicon.ico { return 301 /assets/favicon.svg; }

        # Static asset caching (1 year, immutable)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://vaultlister_staging;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 1y;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Everything else
        location / {
            proxy_pass http://vaultlister_staging;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Request-ID $request_id always;
        }
    }
}
