# VaultLister Docker Compose — Staging Environment
# Port: 3001 (host) → 3000 (container)
# Volume prefix: vaultlister-staging-*
# Deploy with:
#   docker compose -f docker-compose.staging.yml up -d
# Requires GitHub secrets: STAGING_HOST, STAGING_USER, STAGING_SSH_KEY
# Requires server .env at /opt/vaultlister-staging/.env

services:
  # ============================================
  # VaultLister Application (staging)
  # ============================================
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-vaultifacts/vaultlister-3.0}:staging
    container_name: vaultlister-staging-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=staging
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - TRUST_PROXY=1
      # OAuth (optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@staging.vaultlister.com}
      # AI (optional)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Stripe Payments (optional — leave empty to disable paid plans)
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER:-}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-}
      - STRIPE_PRICE_BUSINESS=${STRIPE_PRICE_BUSINESS:-}
      # App URL (for OAuth callbacks)
      - APP_URL=${APP_URL:-}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI:-}
      # OAuth mode (mock or real)
      - OAUTH_MODE=${OAUTH_MODE:-mock}
      # eBay OAuth
      - EBAY_ENVIRONMENT=${EBAY_ENVIRONMENT:-sandbox}
      - EBAY_CLIENT_ID=${EBAY_CLIENT_ID:-}
      - EBAY_CLIENT_SECRET=${EBAY_CLIENT_SECRET:-}
      - EBAY_REDIRECT_URI=${EBAY_REDIRECT_URI:-}
      - EBAY_DELETION_VERIFICATION_TOKEN=${EBAY_DELETION_VERIFICATION_TOKEN:-}
      - EBAY_DELETION_ENDPOINT=${EBAY_DELETION_ENDPOINT:-}
      # Poshmark
      - POSHMARK_USERNAME=${POSHMARK_USERNAME:-}
      - POSHMARK_PASSWORD=${POSHMARK_PASSWORD:-}
      # Mercari
      - MERCARI_USERNAME=${MERCARI_USERNAME:-}
      - MERCARI_PASSWORD=${MERCARI_PASSWORD:-}
    volumes:
      - vaultlister-staging-data:/app/data
      - vaultlister-staging-logs:/app/logs
      - vaultlister-staging-backups:/app/backups
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health',{signal:AbortSignal.timeout(5000)}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    networks:
      - vaultlister-staging-network

  # ============================================
  # Redis (staging — isolated from production)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: vaultlister-staging-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - vaultlister-staging-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaultlister-staging-network

  # ============================================
  # Nginx reverse proxy (staging)
  # Listens on 8080/8443 to avoid collision with
  # any production Nginx on the same host.
  # Proxies to app:3000 internally.
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: vaultlister-staging-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./public:/app/public:ro
      - vaultlister-staging-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - vaultlister-staging-network

# ============================================
# Volumes (staging — isolated from production)
# ============================================
volumes:
  vaultlister-staging-data:
    driver: local
  vaultlister-staging-logs:
    driver: local
  vaultlister-staging-backups:
    driver: local
  vaultlister-staging-redis:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  vaultlister-staging-network:
    driver: bridge
