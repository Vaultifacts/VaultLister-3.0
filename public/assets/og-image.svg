<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="55%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Subtle noise/grain overlay pattern -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle geometric accent circles -->
  <circle cx="980" cy="90"  r="260" fill="white" fill-opacity="0.04"/>
  <circle cx="1060" cy="560" r="180" fill="white" fill-opacity="0.04"/>
  <circle cx="140"  cy="500" r="200" fill="white" fill-opacity="0.03"/>

  <!-- Decorative grid lines -->
  <g stroke="white" stroke-opacity="0.05" stroke-width="1">
    <line x1="0"    y1="210" x2="1200" y2="210"/>
    <line x1="0"    y1="420" x2="1200" y2="420"/>
    <line x1="400"  y1="0"   x2="400"  y2="630"/>
    <line x1="800"  y1="0"   x2="800"  y2="630"/>
  </g>

  <!-- Logo mark -->
  <rect x="100" y="185" width="84" height="84" rx="18" fill="white" fill-opacity="0.15"/>
  <text x="142" y="244" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif"
        font-size="52" font-weight="900" fill="white" text-anchor="middle">V</text>

  <!-- VaultLister wordmark -->
  <text x="100" y="340"
        font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif"
        font-size="80" font-weight="800" fill="white"
        letter-spacing="-2">VaultLister</text>

  <!-- Subtitle -->
  <text x="100" y="400"
        font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif"
        font-size="30" font-weight="400" fill="white" fill-opacity="0.82"
        letter-spacing="0.5">Multi-Channel Reselling Platform</text>

  <!-- Bottom badge strip -->
  <rect x="100" y="450" width="460" height="44" rx="22" fill="white" fill-opacity="0.12"/>
  <text x="330" y="478"
        font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif"
        font-size="16" font-weight="600" fill="white" fill-opacity="0.9"
        text-anchor="middle" letter-spacing="0.3">List to 9+ marketplaces &bull; AI-powered &bull; Zero cost</text>
</svg>
