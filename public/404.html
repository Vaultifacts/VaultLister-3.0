<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 — Page Not Found | VaultLister</title>
        <meta property="og:type" content="website">
        <meta property="og:site_name" content="VaultLister">
        <meta property="og:title" content="404 — Page Not Found | VaultLister">
        <meta property="og:description" content="404 — Page Not Found | VaultLister">
        <meta property="og:url" content="https://vaultlister.com/404.html">
        <meta property="og:image" content="https://vaultlister.com/assets/logo/lockups/horizontal-2048.png">
        <link rel="canonical" href="https://vaultlister.com/404.html" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family:
                    Inter,
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: #ffffff;
                color: #111827;
            }
            .card {
                text-align: center;
                padding: 3rem 2.5rem;
                background: #ffffff;
                border: 1px solid #e5e7eb;
                border-radius: 1rem;
                max-width: 440px;
                width: 90%;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            }
            .code {
                font-size: 5rem;
                font-weight: 800;
                line-height: 1;
                background: linear-gradient(90deg, #f59e0b, #d97706);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 1rem;
            }
            .wordmark {
                font-size: 0.85rem;
                font-weight: 600;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: #f59e0b;
                margin-bottom: 1.5rem;
            }
            h1 {
                font-size: 1.4rem;
                font-weight: 600;
                color: #111827;
                margin-bottom: 0.75rem;
            }
            p {
                font-size: 0.95rem;
                color: #4b5563;
                line-height: 1.6;
                margin-bottom: 2rem;
            }
            a {
                display: inline-block;
                padding: 0.65rem 1.75rem;
                background: linear-gradient(135deg, #d97706, #d97706);
                color: #fff;
                text-decoration: none;
                border-radius: 0.5rem;
                font-size: 0.9rem;
                font-weight: 500;
                transition: opacity 0.15s;
            }
            a:hover {
                opacity: 0.85;
            }
        </style>
    </head>
    <body>
        <main id="main-content">
            <div class="card">
                <div class="code">404</div>
                <div class="wordmark">VaultLister</div>
                <h1>Page not found</h1>
                <p>The page you're looking for doesn't exist or has been moved.</p>
                <a href="/">Back to dashboard</a>
            </div>
        </main>
        <script>
            (function () {
                var hasCurrency = !!localStorage.getItem('vl_currency');
                var hasLang = !!localStorage.getItem('vaultlister_locale');
                if (hasCurrency && hasLang) return;
                fetch('/api/geo')
                    .then(function (r) {
                        return r.json();
                    })
                    .then(function (d) {
                        var cc = d.country_code || '';
                        if (!hasCurrency) {
                            var CURR = {
                                CA: 'CAD',
                                US: 'USD',
                                GB: 'GBP',
                                AU: 'AUD',
                                NZ: 'AUD',
                                FR: 'EUR',
                                DE: 'EUR',
                                IT: 'EUR',
                                ES: 'EUR',
                                NL: 'EUR',
                                BE: 'EUR',
                                AT: 'EUR',
                                FI: 'EUR',
                                IE: 'EUR',
                                PT: 'EUR',
                                GR: 'EUR',
                                LU: 'EUR',
                                SK: 'EUR',
                                SI: 'EUR',
                                EE: 'EUR',
                                LV: 'EUR',
                                LT: 'EUR',
                                CY: 'EUR',
                                MT: 'EUR',
                            };
                            var curr = CURR[cc];
                            if (curr) {
                                var btn = document.querySelector('.currency-option[data-currency="' + curr + '"]');
                                if (btn) btn.click();
                            }
                        }
                        if (!hasLang) {
                            var LANG = {
                                CA: 'en',
                                US: 'en',
                                GB: 'en',
                                AU: 'en',
                                NZ: 'en',
                                IE: 'en',
                                FR: 'fr',
                                BE: 'fr',
                                CH: 'fr',
                                LU: 'fr',
                                DE: 'de',
                                AT: 'de',
                                IT: 'it',
                                ES: 'es',
                                MX: 'es',
                                AR: 'es',
                                CO: 'es',
                                CL: 'es',
                                PT: 'pt',
                                BR: 'pt',
                                JP: 'ja',
                                CN: 'zh',
                                TW: 'zh',
                                HK: 'zh',
                                KR: 'ko',
                                SA: 'ar',
                                AE: 'ar',
                                EG: 'ar',
                                MA: 'ar',
                            };
                            var nav = (navigator.language || '').toLowerCase();
                            var lang = cc === 'CA' && nav.startsWith('fr') ? 'fr' : LANG[cc];
                            if (lang) {
                                var btn = document.querySelector('.lang-option[data-lang="' + lang + '"]');
                                if (btn) btn.click();
                            }
                        }
                    })
                    .catch(function () {});
            })();
        </script>
    </body>
</html>
