          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /whatnot/{id}/items:
    post:
      tags: [Whatnot]
      summary: Add item to show
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inventoryId:
                  type: string
                startingPrice:
                  type: number
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /whatnot/{showId}/items/{itemId}:
    delete:
      tags: [Whatnot]
      summary: Remove item from show
      security:
        - bearerAuth: []
      parameters:
        - name: showId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    idParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    offsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
        refreshToken:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        fullName:
          type: string
        subscriptionTier:
          type: string
          enum: [free, starter, pro, enterprise]
        createdAt:
          type: string
          format: date-time

    InventoryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        brand:
          type: string
        category:
          type: string
        size:
          type: string
        color:
          type: string
        condition:
          type: string
          enum: [new, like_new, good, fair, poor]
        costPrice:
          type: number
        listPrice:
          type: number
        quantity:
          type: integer
        status:
          type: string
          enum: [active, sold, archived, draft]
        images:
          type: array
          items:
            type: string
            format: uri
        sku:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InventoryItemCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        brand:
          type: string
        category:
          type: string
        size:
          type: string
        color:
          type: string
        condition:
          type: string
        costPrice:
          type: number
        listPrice:
          type: number
        quantity:
          type: integer
          default: 1
        images:
          type: array
          items:
            type: string

    InventoryItemUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        brand:
          type: string
        category:
          type: string
        size:
          type: string
        color:
          type: string
        condition:
          type: string
        costPrice:
          type: number
        listPrice:
          type: number
        quantity:
          type: integer
        status:
          type: string

    Listing:
      type: object
      properties:
        id:
          type: string
          format: uuid
        inventoryId:
          type: string
          format: uuid
        platform:
          type: string
        externalId:
          type: string
        title:
          type: string
        price:
          type: number
        status:
          type: string
          enum: [active, sold, draft, archived]
        url:
          type: string
          format: uri
        views:
          type: integer
        likes:
          type: integer
        createdAt:
          type: string
          format: date-time

    ListingCreate:
      type: object
      required: [inventoryId, platform, title, price]
      properties:
        inventoryId:
          type: string
        platform:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
        tags:
          type: array
          items:
            type: string

    Sale:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listingId:
          type: string
          format: uuid
        platform:
          type: string
        salePrice:
          type: number
        platformFees:
          type: number
        shippingCost:
          type: number
        profit:
          type: number
        buyerUsername:
          type: string
        soldAt:
          type: string
          format: date-time

    Shop:
      type: object
      properties:
        id:
          type: string
          format: uuid
        platform:
          type: string
        username:
          type: string
        isConnected:
          type: boolean
        lastSyncAt:
          type: string
          format: date-time
        stats:
          type: object
          properties:
            totalListings:
              type: integer
            totalSales:
              type: integer
            rating:
              type: number

    Automation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [share, relist, price_drop, crosslist]
        platform:
          type: string
        schedule:
          type: string
        isActive:
          type: boolean
        lastRunAt:
          type: string
          format: date-time
        runCount:
          type: integer

    AutomationCreate:
      type: object
      required: [name, type, platform]
      properties:
        name:
          type: string
        type:
          type: string
        platform:
          type: string
        schedule:
          type: string
        config:
          type: object

    AnalyticsOverview:
      type: object
      properties:
        totalRevenue:
          type: number
        totalSales:
          type: integer
        totalProfit:
          type: number
        averageOrderValue:
          type: number
        topPlatform:
          type: string
        topCategory:
          type: string
        revenueByDay:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              revenue:
                type: number
        salesByPlatform:
          type: array
          items:
            type: object
            properties:
              platform:
                type: string
              sales:
                type: integer
              revenue:
                type: number

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listingId:
          type: string
        platform:
          type: string
        buyerUsername:
          type: string
        status:
          type: string
          enum: [pending, shipped, delivered, returned, cancelled]
        trackingNumber:
          type: string
        totalAmount:
          type: number
        createdAt:
          type: string
          format: date-time

    Offer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listingId:
          type: string
        buyerUsername:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [pending, accepted, declined, countered, expired]
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
        type:
          type: string
          enum: [income, expense, transfer]
        amount:
          type: number
        category:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
