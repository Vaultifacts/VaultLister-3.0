openapi: 3.0.3
info:
  title: VaultLister API
  description: |
    REST API for VaultLister - Multi-channel reselling platform.

    ## Authentication
    Most endpoints require a Bearer token in the Authorization header:
    ```
    Authorization: Bearer <your-jwt-token>
    ```

    ## Rate Limiting
    - Standard endpoints: 100 requests/minute
    - Auth endpoints: 10 requests/minute
    - AI endpoints: 20 requests/minute

    ## Error Responses
    All errors return JSON with an `error` field containing the message.
  version: 1.0.0
  contact:
    name: VaultLister Support
    email: support@vaultlister.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://api.vaultlister.com/api
    description: Production

