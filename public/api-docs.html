<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultLister API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.32.1/swagger-ui.css" integrity="sha384-F7uqyyVZgBbuOv+8gNy6ZGJB8Rf12CczPWm130Pxrau0cyZlj1Dl18cDOWpQSrGh" crossorigin="anonymous">
    <style>
        body { margin: 0; background: #ffffff; color: #111827; font-family: Inter, system-ui, -apple-system, sans-serif; }
        .swagger-ui { color: #111827; }
        .api-header {
            background: #ffffff;
            color: #111827;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }
        .api-header h1 { margin: 0 0 0.25rem; font-size: 1.75rem; color: #111827; }
        .api-header p { margin: 0; color: #6b7280; font-size: 0.9rem; }
        .api-header a { color: #d97706; text-decoration: none; }
        .api-header a:hover { text-decoration: underline; color: #b45309; }
        .swagger-ui .topbar { display: none; }
    </style>
</head>
<body>
    <div class="api-header">
        <h1>VaultLister API</h1>
        <p>Interactive endpoint reference &bull; <a href="/">Back to app</a> &bull; <a href="/api-docs.json" download>Download JSON spec</a></p>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.32.1/swagger-ui-bundle.js" integrity="sha384-SlhRXPBpOIwNajIYH/STl3rsa6P/qCR82bZVQk1pDmWr/+Mh9g/RhaUJ1JBmM99R" crossorigin="anonymous"></script>
    <script>
        SwaggerUIBundle({
            url: '/api-docs.json',
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
            layout: 'BaseLayout',
            persistAuthorization: true,
            displayRequestDuration: true,
            filter: true
        });
    </script>
</body>
</html>
