# Logrotate configuration for VaultLister Nginx logs
# Usage: sudo logrotate -f /path/to/nginx/logrotate.conf

/var/log/nginx/access.log /var/log/nginx/error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data www-data
    sharedscripts
    postrotate
        /bin/kill -USR1 `cat /var/run/nginx.pid 2>/dev/null` 2>/dev/null || true
    endscript
}
