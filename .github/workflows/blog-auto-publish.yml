name: Blog Auto-Publish

on:
  schedule:
    - cron: '0 17 * * 1'  # Monday 10AM MST (17:00 UTC)
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.name "VaultLister Bot"
          git config user.email "bot@vaultlister.com"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: npm install

      - name: Generate next scheduled article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.VAULTLISTER_BLOG_BOT }}
        run: bun scripts/generate-blog-article.js --next

      - name: Check for new article files
        id: check_changes
        run: |
          CHANGED=$(git diff --name-only public/blog/*.html public/blog/feed.xml public/sitemap.xml 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files: $CHANGED"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No unpublished topics remaining"
          fi

      - name: Commit and open PR for review
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="blog/auto-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git add public/blog/ public/sitemap.xml
          git commit -m "[AUTO] feat(blog): auto-publish next scheduled article

          Verified: generated by blog-auto-publish workflow"
          git push origin "$BRANCH"
          gh pr create \
            --title "feat(blog): auto-publish next scheduled article" \
            --body "Auto-generated blog article via \`blog-auto-publish\` workflow. Review content before merging to master." \
            --base master \
            --head "$BRANCH"
