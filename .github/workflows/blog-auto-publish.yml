name: Blog Auto-Publish

on:
  schedule:
    - cron: '0 17 * * 1'  # Monday 10AM MST (17:00 UTC)
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.name "VaultLister Bot"
          git config user.email "bot@vaultlister.com"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm install

      - name: Generate next scheduled article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.VAULTLISTER_BLOG_BOT }}
        run: bun scripts/generate-blog-article.js --next

      - name: Check for new article files
        id: check_changes
        run: |
          CHANGED=$(git diff --name-only public/blog/*.html public/blog/feed.xml public/sitemap.xml 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files: $CHANGED"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No unpublished topics remaining"
          fi

      - name: Commit and push new article
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add public/blog/ public/sitemap.xml
          git commit -m "$(cat <<'EOF'
          [AUTO] feat(blog): auto-publish next scheduled article

          Verified: generated by blog-auto-publish workflow
          EOF
          )"
          git push
