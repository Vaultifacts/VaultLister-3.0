name: DLQ Dead Job Alert

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at 5 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  dlq-alert:
    name: Check DLQ dead job count
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch DLQ metrics from production
        id: dlq
        run: |
          BASE_URL="https://vaultlister-app-production.up.railway.app"
          DLQ_THRESHOLD=50

          echo "=== Fetching metrics from ${BASE_URL}/api/monitoring/metrics ==="
          METRICS=$(curl -sf --max-time 15 "${BASE_URL}/api/monitoring/metrics" 2>/dev/null || echo "UNAVAILABLE")

          if [ "$METRICS" = "UNAVAILABLE" ]; then
            echo "::warning::/api/monitoring/metrics unavailable — trying /api/health"
            METRICS=$(curl -sf --max-time 15 "${BASE_URL}/api/health" 2>/dev/null || echo "UNAVAILABLE")
          fi

          if [ "$METRICS" = "UNAVAILABLE" ]; then
            echo "::error::Both monitoring endpoints unreachable"
            echo "DLQ_ALERT=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Raw response (truncated): $(echo "$METRICS" | head -c 500)"

          FAILED=$(echo "$METRICS" | jq -r '.queues.failed // .bullmq.failed // .queue.failed // "unknown"' 2>/dev/null || echo "unknown")

          echo "DLQ failed count: $FAILED"
          echo "FAILED=$FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" != "unknown" ] && [ "$FAILED" -gt "$DLQ_THRESHOLD" ] 2>/dev/null; then
            echo "::warning::DLQ dead job count $FAILED exceeds threshold $DLQ_THRESHOLD"
            echo "DLQ_ALERT=true" >> "$GITHUB_OUTPUT"
          else
            echo "DLQ count within acceptable range"
            echo "DLQ_ALERT=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue if DLQ count exceeded
        if: steps.dlq.outputs.DLQ_ALERT == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const failed  = '${{ steps.dlq.outputs.FAILED }}';
            const title   = '[DLQ] Dead job count exceeds 50';

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'queue-health',
              per_page: 20
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: [
                  `DLQ still elevated on Run #${context.runNumber}`,
                  `Dead jobs: **${failed}** (threshold: 50)`,
                  '',
                  `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                ].join('\n')
              });
              core.notice(`Updated existing DLQ issue: ${dup.html_url}`);
              return;
            }

            const body = [
              '## Dead Letter Queue Alert',
              '',
              `The DLQ check found **${failed}** dead jobs, which exceeds the threshold of **50**.`,
              '',
              '| Metric | Value |',
              '|---|---|',
              `| Dead jobs (failed) | **${failed}** |`,
              `| Threshold | 50 |`,
              `| DLQ processor interval | 30 minutes |`,
              '',
              '### What this means',
              'Jobs that have failed 5+ times have accumulated beyond the expected level.',
              'The DLQ processor runs every 30 minutes and should be clearing these automatically.',
              '',
              '### Recommended actions',
              '1. Check Railway worker logs — DLQ processor may not be running.',
              '2. Review `data/automation-audit.log` for `dlq_job_removed` / `dlq_sweep_error` entries.',
              '3. Inspect job payloads for systematic failures (bad credentials, platform changes).',
              '4. Restart the worker container if the DLQ processor appears stuck.',
              '',
              `**Commit:** \`${context.sha}\``,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['queue-health', 'automated']
            });
            core.notice(`Created DLQ issue: ${issue.data.html_url}`);
