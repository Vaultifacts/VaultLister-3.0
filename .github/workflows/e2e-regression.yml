name: Scheduled E2E Regression

# Items: 31 (weekly Playwright E2E smoke against production), 32 (create issue on failure)

on:
  schedule:
    - cron: '0 10 * * 0'  # Sunday 10 AM UTC weekly
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  e2e-regression:
    name: E2E regression smoke against production
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Point E2E tests at production; smoke suite must support PLAYWRIGHT_BASE_URL override
      PLAYWRIGHT_BASE_URL: https://vaultlister-app-production.up.railway.app
      NODE_ENV: production

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify production is reachable (Item 31)
        id: health-check
        run: |
          STATUS=$(curl -sf --max-time 15 -o /dev/null -w "%{http_code}" \
            "https://vaultlister-app-production.up.railway.app/api/health" 2>/dev/null || echo "000")
          echo "Production health: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Production unreachable (HTTP $STATUS) — skipping E2E regression"
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E smoke suite against production (Item 31)
        id: e2e
        if: steps.health-check.outputs.reachable == 'true'
        run: |
          set +e
          npx playwright test \
            --project=chromium \
            --workers=1 \
            e2e/tests/smoke-auth.spec.js \
            e2e/tests/smoke-settings.spec.js \
            2>&1 | tee /tmp/e2e-output.txt
          E2E_EXIT=$?
          set -e

          PASSED=$(grep -oP '\d+ passed' /tmp/e2e-output.txt | grep -oP '^\d+' | tail -1 || echo "0")
          FAILED=$(grep -oP '\d+ failed' /tmp/e2e-output.txt | grep -oP '^\d+' | tail -1 || echo "0")
          echo "E2E results: ${PASSED} passed, ${FAILED} failed"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "exit_code=$E2E_EXIT" >> "$GITHUB_OUTPUT"

          if [ "$E2E_EXIT" -ne 0 ]; then
            echo "::warning::E2E regression suite had failures — see artifact for details"
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-regression-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Create regression issue on failure (Item 32)
        if: steps.e2e.outputs.exit_code != '0' || steps.health-check.outputs.reachable == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PASSED:    ${{ steps.e2e.outputs.passed }}
          FAILED:    ${{ steps.e2e.outputs.failed }}
          REACHABLE: ${{ steps.health-check.outputs.reachable }}
        with:
          script: |
            const now    = new Date().toUTCString();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const passed   = process.env.PASSED || '0';
            const failed   = process.env.FAILED || '0';
            const reachable = process.env.REACHABLE;

            // Deduplicate — only open one e2e-regression issue at a time
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'e2e-regression', per_page: 10
            });
            if (issues.data.find(i => !i.pull_request)) {
              console.log('Existing e2e-regression issue open — adding comment instead');
              const existing = issues.data.find(i => !i.pull_request);
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number,
                body: `### Re-check — ${new Date().toISOString().slice(0, 10)}\n\n${reachable === 'false' ? 'Production unreachable.' : `${failed} test(s) failed, ${passed} passed.`}\n\n[View run](${runUrl})`
              });
              return;
            }

            const summary = reachable === 'false'
              ? 'Production was unreachable during the scheduled E2E regression run.'
              : `**${failed} test(s) failed** out of ${parseInt(passed) + parseInt(failed)} total in the weekly smoke suite.`;

            const body = [
              '## E2E Regression Failure',
              '',
              summary,
              '',
              '## Details',
              `- Passed: ${passed}`,
              `- Failed: ${failed}`,
              `- Production URL: https://vaultlister-app-production.up.railway.app`,
              '',
              '## Actions',
              '1. Review the [workflow run artifacts](' + runUrl + ') for screenshots and traces.',
              '2. Run `npx playwright test --headed` locally against production to reproduce.',
              '3. Fix the regression and close this issue.',
              '',
              '---',
              `*Detected at ${now}. [View workflow run](${runUrl})*`
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[E2E Regression] ${failed} test(s) failed — ${new Date().toISOString().slice(0, 10)}`,
              body,
              labels: ['e2e-regression', 'automated']
            });
            console.log(`Created regression issue #${issue.data.number}: ${issue.data.html_url}`);
