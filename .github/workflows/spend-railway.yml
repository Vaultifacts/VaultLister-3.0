name: Railway Spend Review

on:
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  railway-spend-review:
    name: Railway spend reminder
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Determine current month label
        id: month
        run: |
          set -euo pipefail
          MONTH_LABEL=$(date -u +%Y-%m)
          echo "month_label=$MONTH_LABEL" >> "$GITHUB_OUTPUT"
          echo "Current month: $MONTH_LABEL"

      - name: Check for existing open billing issue this month
        id: existing-issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const monthLabel = '${{ steps.month.outputs.month_label }}';
            const titleSubstr = `[Billing] Monthly Railway spend review — ${monthLabel}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'billing',
              per_page: 100
            });

            const existing = issues.data.find(i =>
              i.title.includes(titleSubstr) && !i.pull_request
            );

            if (existing) {
              console.log(`Existing billing issue for ${monthLabel}: #${existing.number} ${existing.html_url}`);
              core.setOutput('exists', 'true');
              core.setOutput('issue_number', String(existing.number));
              core.setOutput('issue_url', existing.html_url);
            } else {
              console.log(`No existing billing issue for ${monthLabel}`);
              core.setOutput('exists', 'false');
            }

      - name: Create monthly Railway spend review issue
        id: create-issue
        if: steps.existing-issue.outputs.exists == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const monthLabel = '${{ steps.month.outputs.month_label }}';
            const now = new Date().toUTCString();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `[Billing] Monthly Railway spend review — ${monthLabel}`;

            const body = [
              '## Railway Monthly Spend Review',
              '',
              `> Review period: **${monthLabel}**`,
              '',
              '> Railway does not expose a public billing API. This is a manual review reminder.',
              '',
              '## Action Required',
              '',
              '1. Log in to [Railway dashboard](https://railway.app) and navigate to **Settings > Usage**.',
              '2. Review current-month compute hours, bandwidth, and storage.',
              '3. Confirm spend is within expected budget.',
              '4. If usage is unexpectedly high, investigate recent deployments or traffic spikes.',
              '5. Verify no extra services have been provisioned unintentionally.',
              '6. Close this issue once review is complete.',
              '',
              '## Key Resources',
              '',
              '| Resource | Link |',
              '|----------|------|',
              '| Railway Usage Dashboard | https://railway.app (Settings > Usage) |',
              '| Railway Pricing | https://railway.app/pricing |',
              '',
              '## Budget Reference',
              '',
              '- Hobby plan: $5/month credit included',
              '- Pro plan: usage-based; monitor CPU/memory/bandwidth',
              '- Alert threshold: investigate any month > $50 beyond plan credit',
              '',
              '---',
              '',
              `*Created by the \`spend-railway\` workflow at ${now}. [View run](${runUrl})*`
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['billing', 'automated']
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
            core.setOutput('issue_url', issue.data.html_url);

      - name: Log status
        if: always()
        run: |
          MONTH="${{ steps.month.outputs.month_label }}"
          EXISTS="${{ steps.existing-issue.outputs.exists }}"
          ISSUE_URL="${{ steps.existing-issue.outputs.issue_url || steps.create-issue.outputs.issue_url || 'n/a' }}"

          if [ "$EXISTS" = "true" ]; then
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] RAILWAY-SPEND month=$MONTH status=already-open issue=$ISSUE_URL"
          else
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] RAILWAY-SPEND month=$MONTH status=issue-created issue=$ISSUE_URL"
          fi
