name: Production Smoke

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ['Deploy']
    types: [completed]

concurrency:
  group: production-smoke
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    name: Production smoke checks
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    env:
      BASE_URL: https://vaultlister.com
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
      REDIS_PUBLIC_URL: ${{ secrets.REDIS_PUBLIC_URL }}
      TASK_QUEUE_PENDING_MAX: '50'
      TASK_QUEUE_FAILED_24H_MAX: '10'
      TASK_QUEUE_STALE_PROCESSING_MAX: '0'
      BULLMQ_WAITING_MAX: '50'
      BULLMQ_FAILED_MAX: '10'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run production smoke with deploy-settle retries
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Production smoke attempt $attempt/3"
            # GitHub-hosted runners have produced false WebSocket connect errors
            # against the production edge. Keep this scheduled monitor focused on
            # HTTP readiness, worker heartbeats, task_queue, and BullMQ. Run the
            # full local smoke with --all for WebSocket Redis pub/sub verification.
            if bun scripts/launch-ops-check.mjs "$BASE_URL" --task-queue --queue-metrics --json | tee smoke-result.json; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Smoke failed; waiting 30 seconds before retry..."
              sleep 30
            fi
          done
          exit 1

      - name: Upload smoke result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-smoke-result
          path: smoke-result.json
          if-no-files-found: ignore

  notify-failure:
    name: Open or update smoke failure issue
    runs-on: ubuntu-latest
    needs: smoke
    if: failure()

    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const title = '[Production Smoke Failure] vaultlister.com';
            const body = [
              'Production smoke checks failed.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: \`${context.sha}\``,
              `Triggered by: \`${context.eventName}\``,
              '',
              'Investigate app readiness, worker heartbeats, task_queue, BullMQ, and WebSocket Redis pub/sub.'
            ].join('\n');
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'production-smoke-failure',
              per_page: 10
            });
            const existing = issues.data.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              core.notice(`Updated existing smoke failure issue: ${existing.html_url}`);
              return;
            }
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['production-smoke-failure', 'automated']
            });
            core.notice(`Created smoke failure issue: ${created.data.html_url}`);

  notify-recovery:
    name: Close recovered smoke failure issue
    runs-on: ubuntu-latest
    needs: smoke
    if: success()

    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const title = '[Production Smoke Failure] vaultlister.com';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'production-smoke-failure',
              per_page: 10
            });
            const existing = issues.data.find(issue => issue.title === title);
            if (!existing) {
              core.notice('No open production smoke failure issue to close.');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Production smoke checks recovered.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
              state_reason: 'completed'
            });
            core.notice(`Closed recovered smoke failure issue: ${existing.html_url}`);
