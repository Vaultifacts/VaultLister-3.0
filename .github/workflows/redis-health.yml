name: Redis Health Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  redis-health:
    name: Check Redis health via app endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Railway Redis is on an internal network not reachable from GitHub Actions.
    # We proxy through the app's /api/health and /api/monitoring/metrics endpoints,
    # which already report Redis connectivity status.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Redis via /api/health
        id: health
        run: |
          BASE_URL="https://vaultlister-app-production.up.railway.app"

          echo "=== Hitting ${BASE_URL}/api/health ==="
          HEALTH_RESPONSE=$(curl -sf --max-time 15 "${BASE_URL}/api/health" 2>/dev/null || echo "CURL_FAILED")

          if [ "$HEALTH_RESPONSE" = "CURL_FAILED" ]; then
            echo "::error::/api/health endpoint unreachable"
            echo "REDIS_STATUS=unreachable" >> "$GITHUB_OUTPUT"
            echo "HEALTH_JSON=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Health response: $HEALTH_RESPONSE"

          # Extract redis status from JSON
          REDIS_OK=$(echo "$HEALTH_RESPONSE" | jq -r '.redis // .services.redis // "unknown"' 2>/dev/null || echo "unknown")
          echo "Redis status from /api/health: $REDIS_OK"
          echo "REDIS_STATUS=$REDIS_OK" >> "$GITHUB_OUTPUT"
          echo "HEALTH_JSON=$HEALTH_RESPONSE" >> "$GITHUB_OUTPUT"

      - name: Check Redis via /api/monitoring/metrics
        id: metrics
        run: |
          BASE_URL="https://vaultlister-app-production.up.railway.app"

          echo "=== Hitting ${BASE_URL}/api/monitoring/metrics ==="
          METRICS_RESPONSE=$(curl -sf --max-time 15 "${BASE_URL}/api/monitoring/metrics" 2>/dev/null || echo "ENDPOINT_UNAVAILABLE")

          if [ "$METRICS_RESPONSE" = "ENDPOINT_UNAVAILABLE" ]; then
            echo "::warning::/api/monitoring/metrics not available (may require auth) — skipping"
            echo "METRICS_REDIS=unknown" >> "$GITHUB_OUTPUT"
          else
            METRICS_REDIS=$(echo "$METRICS_RESPONSE" | jq -r '.redis // .cache.status // "unknown"' 2>/dev/null || echo "unknown")
            echo "Redis status from /api/monitoring/metrics: $METRICS_REDIS"
            echo "METRICS_REDIS=$METRICS_REDIS" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate Redis health
        id: evaluate
        run: |
          REDIS_STATUS="${{ steps.health.outputs.REDIS_STATUS }}"
          echo "Redis health status: $REDIS_STATUS"

          # Treat anything other than ok/healthy/true/connected as unhealthy
          case "$REDIS_STATUS" in
            ok|healthy|true|connected|"true")
              echo "Redis is healthy"
              echo "UNHEALTHY=false" >> "$GITHUB_OUTPUT"
              ;;
            unreachable)
              echo "::error::App health endpoint is unreachable — cannot determine Redis status"
              echo "UNHEALTHY=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::warning::Redis status is '$REDIS_STATUS' — treating as unhealthy"
              echo "UNHEALTHY=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Create issue if Redis unhealthy
        if: steps.evaluate.outputs.UNHEALTHY == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const redisStatus = '${{ steps.health.outputs.REDIS_STATUS }}';
            const title = '[Redis] Health check failed — Redis may be down or misconfigured';

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'infrastructure',
              per_page: 20
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: [
                  `Redis still unhealthy on Run #${context.runNumber}`,
                  `Status reported: \`${redisStatus}\``,
                  '',
                  `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                ].join('\n')
              });
              core.notice(`Updated existing Redis health issue: ${dup.html_url}`);
              return;
            }

            const body = [
              '## Redis Health Alert',
              '',
              `The weekly Redis health check reports status: **\`${redisStatus}\`**`,
              '',
              'This check proxies through the app\'s `/api/health` endpoint because Railway Redis is on an internal network not reachable from GitHub Actions.',
              '',
              '### Possible causes',
              '- Railway Redis service is down or restarting.',
              '- `REDIS_URL` environment variable is misconfigured in Railway.',
              '- BullMQ worker lost its Redis connection.',
              '',
              '### Recommended actions',
              '1. Check the Railway dashboard for Redis service status.',
              '2. Verify `REDIS_URL` is set correctly in Railway environment variables.',
              '3. Review app logs for Redis connection errors.',
              '4. Restart the Railway Redis service if it appears stuck.',
              '',
              `**Commit:** \`${context.sha}\``,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['infrastructure', 'automated']
            });
            core.notice(`Created Redis health issue: ${issue.data.html_url}`);
