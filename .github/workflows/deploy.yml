name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Unit Tests (PostgreSQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: vaultlister_test
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-min-32-chars-xxxxxxxx
      OAUTH_ENCRYPTION_KEY: test-encryption-key-min-32-chars-xx
      PORT: '3000'
      TEST_BASE_URL: http://localhost:3000
      DISABLE_CSRF: 'true'
      DISABLE_RATE_LIMIT: 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initialize test database
        run: |
          bun run db:init
          bun run db:seed

      - name: Start server
        run: |
          bun run start &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/api/health > /dev/null && break; sleep 1; done
          curl -sf http://localhost:3000/api/health > /dev/null || { echo "Server failed to start"; exit 1; }

      - name: Lint test baseline
        run: bun scripts/test-baseline.mjs lint-baseline

      - name: Run unit tests
        run: |
          set +e
          bun test src/tests/ 2>&1 | tee /tmp/test-output.txt
          TEST_EXIT=$?
          set -e

          if [ $TEST_EXIT -eq 0 ]; then
            echo "All tests passed!"
          else
            bun scripts/test-baseline.mjs check-output /tmp/test-output.txt
          fi

  test-e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: vaultlister_test
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-min-32-chars-xxxxxxxx
      OAUTH_ENCRYPTION_KEY: test-encryption-key-min-32-chars-xx
      PORT: '3000'
      TEST_BASE_URL: http://localhost:3000
      DISABLE_CSRF: 'true'
      DISABLE_RATE_LIMIT: 'true'
      FEATURE_AI_LISTING: 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Initialize test database
        run: |
          bun run db:init
          bun run db:seed

      - name: Build frontend
        run: bun run build

      - name: Run smoke suite
        run: bun run test:e2e:smoke

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test, test-e2e-smoke]
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Trigger Railway auto-deploy
        run: |
          echo "Tests passed — Railway will auto-deploy commit ${{ github.sha }} from GitHub source"
          echo "Monitor deployment at https://railway.app/project/73f90c33-83db-4301-a138-b5ca5a2c8de4"

  notify-failure:
    name: Notify Deploy Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const title = `[Deploy Failure] ${context.sha.substring(0, 7)} — Run #${context.runNumber}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-failure',
              per_page: 10
            });
            const existing = issues.data.find(i => i.title.startsWith('[Deploy Failure]'));
            if (existing) {
              core.notice(`Deploy failure detected, existing issue: ${existing.html_url}`);
              return;
            }
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `Production deploy failed.\n\n**Commit:** \`${context.sha}\`\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate and close this issue once resolved.`,
              labels: ['deploy-failure', 'automated']
            });
            core.notice(`Created deploy failure issue: ${issue.data.html_url}`);
