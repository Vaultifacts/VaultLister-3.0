name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Unit Tests (PostgreSQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vaultlister_test
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-min-32-chars-xxxxxxxx
      OAUTH_ENCRYPTION_KEY: test-encryption-key-min-32-chars-xx
      PORT: '3000'
      TEST_BASE_URL: http://localhost:3000
      DISABLE_CSRF: 'true'
      DISABLE_RATE_LIMIT: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initialize test database
        run: |
          bun run db:init
          bun run db:seed

      - name: Start server
        run: |
          bun run start &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/api/health > /dev/null && break; sleep 1; done
          curl -sf http://localhost:3000/api/health > /dev/null || { echo "Server failed to start"; exit 1; }

      - name: Run unit tests
        run: |
          set +e
          bun test src/tests/ 2>&1 | tee /tmp/test-output.txt
          TEST_EXIT=$?
          set -e

          if [ $TEST_EXIT -eq 0 ]; then
            echo "All tests passed!"
          else
            KNOWN_FAIL_NAMES=$(grep -v '^\s*#' .test-baseline | grep '^KNOWN_FAIL: ' | sed 's/^KNOWN_FAIL: //' || true)
            ACTUAL_FAIL_NAMES=$(grep '^(fail) ' /tmp/test-output.txt | sed 's/^(fail) //' || true)

            REGRESSIONS=""
            while IFS= read -r fail_name; do
              [ -z "$fail_name" ] && continue
              if ! echo "$KNOWN_FAIL_NAMES" | grep -qxF "$fail_name"; then
                REGRESSIONS="${REGRESSIONS}  REGRESSION: ${fail_name}"$'\n'
              fi
            done <<< "$ACTUAL_FAIL_NAMES"

            KNOWN_FAILURES=$(grep -v '^\s*#' .test-baseline | grep -oP 'KNOWN_FAILURES=\K\d+' | head -1)
            KNOWN_FAILURES=${KNOWN_FAILURES:-0}
            ACTUAL_FAILURES=$(grep -oP '\d+ fail' /tmp/test-output.txt | grep -oP '^\d+' | head -1)
            ACTUAL_FAILURES=${ACTUAL_FAILURES:-999}

            if [ -n "$REGRESSIONS" ]; then
              echo "::error::New test regressions detected:"
              echo "$REGRESSIONS"
              exit 1
            elif [ "$ACTUAL_FAILURES" -le "$KNOWN_FAILURES" ]; then
              echo "::warning::$ACTUAL_FAILURES test failure(s) — all are known pre-existing failures"
            else
              echo "::error::$ACTUAL_FAILURES test failure(s) exceeds baseline of $KNOWN_FAILURES"
              exit 1
            fi
          fi

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Trigger Railway auto-deploy
        run: |
          echo "Tests passed — Railway will auto-deploy commit ${{ github.sha }} from GitHub source"
          echo "Monitor deployment at https://railway.app/project/73f90c33-83db-4301-a138-b5ca5a2c8de4"
