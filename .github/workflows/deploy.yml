name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Unit Tests (PostgreSQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: vaultlister_test
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-min-32-chars-xxxxxxxx
      OAUTH_ENCRYPTION_KEY: test-encryption-key-min-32-chars-xx
      PORT: '3000'
      TEST_BASE_URL: http://localhost:3000
      DISABLE_CSRF: 'true'
      DISABLE_RATE_LIMIT: 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initialize test database
        run: |
          bun run db:init
          bun run db:seed

      - name: Start server
        run: |
          bun run start &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/api/health > /dev/null && break; sleep 1; done
          curl -sf http://localhost:3000/api/health > /dev/null || { echo "Server failed to start"; exit 1; }

      - name: Lint test baseline
        run: bun scripts/test-baseline.mjs lint-baseline

      - name: Run unit tests
        run: |
          set +e
          bun test src/tests/ 2>&1 | tee /tmp/test-output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          if [ $TEST_EXIT -eq 0 ]; then
            echo "All tests passed!"
          else
            bun scripts/test-baseline.mjs check-output /tmp/test-output.txt
          fi

          # Check coverage thresholds (matches ci.yml THRESHOLD)
          LINE_COV=$(grep 'All files' /tmp/test-output.txt | grep -oP '\d+\.\d+' | tail -1)
          FUNC_COV=$(grep 'All files' /tmp/test-output.txt | grep -oP '\d+\.\d+' | head -1)
          echo "Coverage: Functions=${FUNC_COV}% Lines=${LINE_COV}%"

          if [ -n "$LINE_COV" ]; then
            THRESHOLD=54.5
            if [ "$(echo "$LINE_COV < $THRESHOLD" | bc)" -eq 1 ]; then
              echo "::error::Line coverage ${LINE_COV}% is below ${THRESHOLD}% threshold"
              exit 1
            fi
            echo "Line coverage ${LINE_COV}% meets ${THRESHOLD}% threshold"
          fi

  test-e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: vaultlister_test
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-min-32-chars-xxxxxxxx
      OAUTH_ENCRYPTION_KEY: test-encryption-key-min-32-chars-xx
      PORT: '3000'
      TEST_BASE_URL: http://localhost:3000
      DISABLE_CSRF: 'true'
      DISABLE_RATE_LIMIT: 'true'
      FEATURE_AI_LISTING: 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Initialize test database
        run: |
          bun run db:init
          bun run db:seed

      - name: Build frontend
        run: bun run build

      - name: Run smoke suite
        run: bun run test:e2e:smoke

  wait-staging:
    name: Wait for Staging Deploy
    runs-on: ubuntu-latest
    needs: [test, test-e2e-smoke]
    steps:
      - name: Wait for staging health
        env:
          RAILWAY_STAGING_URL: ${{ secrets.RAILWAY_STAGING_URL }}
        run: |
          for i in $(seq 1 30); do
            if curl -sf "${RAILWAY_STAGING_URL}/api/health/ready" > /dev/null 2>&1; then
              echo "Staging healthy after $((i * 10))s"; exit 0
            fi
            echo "Attempt $i/30 — waiting 10s..."; sleep 10
          done
          echo "::error::Staging health check timed out after 300s"; exit 1

  smoke-staging:
    name: Smoke Test Staging
    runs-on: ubuntu-latest
    needs: [wait-staging]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Smoke test staging
        env:
          RAILWAY_STAGING_URL: ${{ secrets.RAILWAY_STAGING_URL }}
        run: bun scripts/post-deploy-check.mjs "${RAILWAY_STAGING_URL}" --json

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test, test-e2e-smoke, smoke-staging]
    environment: production
    permissions:
      contents: write
      deployments: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update sitemap lastmod
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|<lastmod>[0-9-]*</lastmod>|<lastmod>${TODAY}</lastmod>|g" public/sitemap.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml
          git diff --cached --quiet || git commit -m "[AUTO] chore: update sitemap lastmod to ${TODAY}"
          git push || true

      - name: Trigger Railway auto-deploy
        run: |
          echo "Tests passed — Railway will auto-deploy commit ${{ github.sha }} from GitHub source"
          echo "Monitor deployment at https://railway.app/project/73f90c33-83db-4301-a138-b5ca5a2c8de4"

  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.30.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment
        env:
          RAILWAY_PRODUCTION_URL: ${{ secrets.RAILWAY_PRODUCTION_URL }}
        run: |
          PROD_URL="${RAILWAY_PRODUCTION_URL:-https://vaultlister-app-production.up.railway.app}"
          echo "Waiting for Railway deployment..."
          for i in $(seq 1 12); do
            if curl -sf "${PROD_URL}/api/health" > /dev/null 2>&1; then
              echo "Deployment healthy after $((i * 10))s"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "::warning::Deployment health check timed out after 120s"

      - name: Run post-deploy health check (Item 7)
        env:
          RAILWAY_PRODUCTION_URL: https://vaultlister-app-production.up.railway.app
        run: |
          # Item 7 — run post-deploy-check.mjs against the live Railway URL.
          if [ ! -f scripts/post-deploy-check.mjs ]; then
            echo "::error::scripts/post-deploy-check.mjs not found"
            exit 1
          fi
          bun scripts/post-deploy-check.mjs "${RAILWAY_PRODUCTION_URL}" --json

      - name: Verify WebSocket upgrade at Railway origin
        env:
          RAILWAY_PRODUCTION_URL: https://vaultlister-app-production.up.railway.app
        run: |
          if [ ! -f scripts/websocket-upgrade-check.mjs ]; then
            echo "::error::scripts/websocket-upgrade-check.mjs not found"
            exit 1
          fi
          node scripts/websocket-upgrade-check.mjs "${RAILWAY_PRODUCTION_URL}" --json

      - name: Verify Railway deploy commit (Item 8)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          # Item 8 — verify the running Railway container has our expected commit.
          # If Railway skipped the app deployment (no relevant source changes), exit
          # early — the prior SUCCESS deploy is still live and health check already passed.
          # We check for SKIPPED inside the loop because Railway may still be processing
          # the deployment as WAITING when this step starts.
          if [ ! -f scripts/verify-railway-deploy.mjs ]; then
            echo "::error::scripts/verify-railway-deploy.mjs not found"
            exit 1
          fi
          for i in $(seq 1 36); do
            CURRENT_STATUS=$(railway deployment list \
                --service vaultlister-app \
                --environment production 2>/dev/null \
              | grep -m1 -E '^\s+[0-9a-f-]+ \|' \
              | awk -F'|' '{gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); print $2}')
            if [ "$CURRENT_STATUS" = "SKIPPED" ]; then
              echo "::notice::Railway deployment SKIPPED for vaultlister-app — no app source changes; prior SUCCESS deploy is live."
              exit 0
            fi
            if bun scripts/verify-railway-deploy.mjs --environment production --commit "${EXPECTED_SHA}" --json; then
              exit 0
            fi
            echo "Railway deploy commit not ready yet (attempt $i/36); waiting 10s..."
            sleep 10
          done
          echo "::error::Railway deploy commit verification did not pass after 360s"
          exit 1

      - name: Check for orphaned dist/ chunks (Item 9)
        run: |
          # Item 9 — list dist/ chunk files not referenced by index.html.
          if [ ! -d dist/ ]; then
            echo "dist/ not found — skipping orphan chunk check"
            exit 0
          fi
          ORPHANS=0
          for CHUNK in dist/*.js dist/*.css; do
            [ -f "$CHUNK" ] || continue
            BASENAME=$(basename "$CHUNK")
            if ! grep -q "$BASENAME" src/frontend/index.html 2>/dev/null && \
               ! grep -q "$BASENAME" public/index.html 2>/dev/null; then
              echo "::warning::Possibly orphaned dist file not referenced by index.html: $BASENAME"
              ORPHANS=$((ORPHANS + 1))
            fi
          done
          if [ "$ORPHANS" -eq 0 ]; then
            echo "No orphaned dist/ chunks detected"
          else
            echo "::warning::${ORPHANS} chunk(s) may be orphaned — review dist/ vs index.html references"
          fi

      # Requires CLOUDFLARE_ZONE_ID and CLOUDFLARE_API_TOKEN secrets to be set in the repository/environment.
      - name: Purge Cloudflare cache
        if: success()
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | jq '.success'
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify browser WebSocket connection at custom domain
        env:
          CUSTOM_DOMAIN_URL: https://vaultlister.com
        run: |
          if [ ! -f scripts/browser-websocket-check.mjs ]; then
            echo "::error::scripts/browser-websocket-check.mjs not found"
            exit 1
          fi

          set +e
          node scripts/browser-websocket-check.mjs "${CUSTOM_DOMAIN_URL}" --json --allow-cloudflare-challenge | tee /tmp/browser-websocket-check.json
          CHECK_EXIT=${PIPESTATUS[0]}
          set -e

          CLASSIFICATION=$(jq -r '.classification // "unknown"' /tmp/browser-websocket-check.json)
          if [ "$CLASSIFICATION" = "cloudflare_challenge" ]; then
            echo "::warning::Custom-domain browser WebSocket check hit a Cloudflare challenge. Railway origin health, Railway-origin WebSocket, commit verification, orphan chunk check, and cache purge already passed; treating this as edge/security-layer monitoring noise, not a deploy failure."
            exit 0
          fi

          exit "$CHECK_EXIT"

  notify-failure:
    name: Notify Deploy Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = `[Deploy Failure] ${context.sha.substring(0, 7)} — Run #${context.runNumber}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-failure',
              per_page: 10
            });
            const existing = issues.data.find(i => i.title.startsWith('[Deploy Failure]'));
            if (existing) {
              core.notice(`Deploy failure detected, existing issue: ${existing.html_url}`);
              return;
            }
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `Production deploy failed.\n\n**Commit:** \`${context.sha}\`\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate and close this issue once resolved.`,
              labels: ['deploy-failure', 'automated']
            });
            core.notice(`Created deploy failure issue: ${issue.data.html_url}`);
