name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main, master]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=staging,enable=${{ github.event.inputs.environment == 'staging' || github.event.inputs.environment == '' }}
            type=raw,value=prod,enable=${{ github.event.inputs.environment == 'production' }}
            type=raw,value=latest,enable=${{ github.event.inputs.environment == 'production' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event.inputs.environment == 'staging'
    environment: staging

    steps:
      - name: Deploy to staging server via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/vaultlister-staging
            bash deploy.sh

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 22 }}
          envs: REGISTRY_TOKEN,REGISTRY_USER
          script: |
            set -e
            cd /opt/vaultlister

            # Tag current running image for rollback (REM-08)
            CURRENT_IMAGE=$(docker compose images app --format json 2>/dev/null | jq -r '.[0].Repository + ":" + .[0].Tag' 2>/dev/null || echo "")
            if [ -n "$CURRENT_IMAGE" ] && [ "$CURRENT_IMAGE" != ":" ] && [ "$CURRENT_IMAGE" != "null:null" ]; then
              docker tag "$CURRENT_IMAGE" "${CURRENT_IMAGE%%:*}:rollback" 2>/dev/null || true
              echo "Tagged rollback image: $CURRENT_IMAGE"
            fi

            # Pull latest image from GHCR
            echo "$REGISTRY_TOKEN" | docker login ghcr.io -u "$REGISTRY_USER" --password-stdin
            docker compose pull app

            # Backup database before deploying
            if [ -f scripts/backup.js ]; then
              bun scripts/backup.js --compress || cp data/vaultlister.db "data/vaultlister.db.backup.$(date +%Y%m%d_%H%M%S)" || true
            else
              cp data/vaultlister.db "data/vaultlister.db.backup.$(date +%Y%m%d_%H%M%S)" || true
            fi

            # Rolling restart
            docker compose up -d --no-deps app

            # Wait for health check
            HEALTHY=false
            for i in $(seq 1 12); do
              STATUS=$(docker compose exec -T app curl -sf http://localhost:3000/api/health | jq -r '.status' 2>/dev/null || echo "")
              if [ "$STATUS" = "healthy" ]; then
                echo "Production health check passed"
                HEALTHY=true
                break
              fi
              echo "Waiting for health check... ($i/12)"
              sleep 5
            done

            # Rollback if health check failed (REM-08)
            if [ "$HEALTHY" != "true" ]; then
              echo "ERROR: Production health check failed after 60s — rolling back"
              ROLLBACK_IMAGE="${CURRENT_IMAGE%%:*}:rollback"
              if docker image inspect "$ROLLBACK_IMAGE" >/dev/null 2>&1; then
                docker compose down app 2>/dev/null || true
                docker tag "$ROLLBACK_IMAGE" "$CURRENT_IMAGE" 2>/dev/null || true
                docker compose up -d --no-deps app
                echo "Rolled back to previous image"
                sleep 10
                docker compose exec -T app curl -sf http://localhost:3000/api/health | jq . || echo "WARNING: Rollback health check also failed"
              else
                echo "WARNING: No rollback image available — manual intervention required"
              fi
              exit 1
            fi

            docker compose exec -T app curl -sf http://localhost:3000/api/health | jq .
            docker image prune -f

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: always()

    steps:
      - name: Notify on success
        if: needs.deploy-staging.result == 'success'
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          MESSAGE="✅ VaultLister deployed to staging%0A%0ACommit: ${SHORT_SHA}%0ABranch: ${{ github.ref_name }}%0ABy: ${{ github.actor }}"
          if [ -n "${{ secrets.TELEGRAM_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MESSAGE}" || true
          fi
          echo "Deployment successful: ${SHORT_SHA}"

      - name: Notify on failure
        if: needs.deploy-staging.result == 'failure'
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          MESSAGE="❌ VaultLister staging deploy FAILED%0A%0ACommit: ${SHORT_SHA}%0ABranch: ${{ github.ref_name }}%0ABy: ${{ github.actor }}%0A%0ACheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "${{ secrets.TELEGRAM_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MESSAGE}" || true
          fi
          echo "Deployment failed — see logs above"
          exit 1
