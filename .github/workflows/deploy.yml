name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Unit Tests (PostgreSQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: vaultlister_test
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-min-32-chars-xxxxxxxx
      OAUTH_ENCRYPTION_KEY: test-encryption-key-min-32-chars-xx
      PORT: '3000'
      TEST_BASE_URL: http://localhost:3000
      DISABLE_CSRF: 'true'
      DISABLE_RATE_LIMIT: 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initialize test database
        run: |
          bun run db:init
          bun run db:seed

      - name: Start server
        run: |
          bun run start &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/api/health > /dev/null && break; sleep 1; done
          curl -sf http://localhost:3000/api/health > /dev/null || { echo "Server failed to start"; exit 1; }

      - name: Lint test baseline
        run: bun scripts/test-baseline.mjs lint-baseline

      - name: Run unit tests
        run: |
          set +e
          bun test src/tests/ 2>&1 | tee /tmp/test-output.txt
          TEST_EXIT=$?
          set -e

          if [ $TEST_EXIT -eq 0 ]; then
            echo "All tests passed!"
          else
            bun scripts/test-baseline.mjs check-output /tmp/test-output.txt
          fi

  test-e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: vaultlister_test
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-min-32-chars-xxxxxxxx
      OAUTH_ENCRYPTION_KEY: test-encryption-key-min-32-chars-xx
      PORT: '3000'
      TEST_BASE_URL: http://localhost:3000
      DISABLE_CSRF: 'true'
      DISABLE_RATE_LIMIT: 'true'
      FEATURE_AI_LISTING: 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Initialize test database
        run: |
          bun run db:init
          bun run db:seed

      - name: Build frontend
        run: bun run build

      - name: Run smoke suite
        run: bun run test:e2e:smoke

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test, test-e2e-smoke]
    environment: production
    permissions:
      contents: write
      deployments: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update sitemap lastmod
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|<lastmod>[0-9-]*</lastmod>|<lastmod>${TODAY}</lastmod>|g" public/sitemap.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml
          git diff --cached --quiet || git commit -m "[AUTO] chore: update sitemap lastmod to ${TODAY}"
          git push || true

      - name: Trigger Railway auto-deploy
        run: |
          echo "Tests passed — Railway will auto-deploy commit ${{ github.sha }} from GitHub source"
          echo "Monitor deployment at https://railway.app/project/73f90c33-83db-4301-a138-b5ca5a2c8de4"

  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wait for deployment
        env:
          RAILWAY_PRODUCTION_URL: ${{ secrets.RAILWAY_PRODUCTION_URL }}
        run: |
          PROD_URL="${RAILWAY_PRODUCTION_URL:-https://vaultlister-app-production.up.railway.app}"
          echo "Waiting for Railway deployment..."
          for i in $(seq 1 12); do
            if curl -sf "${PROD_URL}/api/health" > /dev/null 2>&1; then
              echo "Deployment healthy after $((i * 10))s"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "::warning::Deployment health check timed out after 120s"

      - name: Run post-deploy health check (Item 7)
        env:
          RAILWAY_PRODUCTION_URL: https://vaultlister-app-production.up.railway.app
        run: |
          # Item 7 — run post-deploy-check.mjs against the live Railway URL.
          if [ -f scripts/post-deploy-check.mjs ]; then
            bun scripts/post-deploy-check.mjs || {
              echo "::warning::post-deploy-check.mjs reported issues — check Railway deployment"
            }
          else
            echo "::warning::scripts/post-deploy-check.mjs not found — skipping"
          fi

      - name: Verify Railway deploy commit (Item 8)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          # Item 8 — verify the running Railway container has our expected commit.
          if [ -f scripts/verify-railway-deploy.mjs ]; then
            bun scripts/verify-railway-deploy.mjs || {
              echo "::warning::verify-railway-deploy.mjs reported a mismatch — deploy may still be propagating"
            }
          else
            echo "::warning::scripts/verify-railway-deploy.mjs not found — skipping"
          fi

      - name: Check for orphaned dist/ chunks (Item 9)
        run: |
          # Item 9 — list dist/ chunk files not referenced by index.html.
          if [ ! -d dist/ ]; then
            echo "dist/ not found — skipping orphan chunk check"
            exit 0
          fi
          ORPHANS=0
          for CHUNK in dist/*.js dist/*.css; do
            [ -f "$CHUNK" ] || continue
            BASENAME=$(basename "$CHUNK")
            if ! grep -q "$BASENAME" src/frontend/index.html 2>/dev/null && \
               ! grep -q "$BASENAME" public/index.html 2>/dev/null; then
              echo "::warning::Possibly orphaned dist file not referenced by index.html: $BASENAME"
              ORPHANS=$((ORPHANS + 1))
            fi
          done
          if [ "$ORPHANS" -eq 0 ]; then
            echo "No orphaned dist/ chunks detected"
          else
            echo "::warning::${ORPHANS} chunk(s) may be orphaned — review dist/ vs index.html references"
          fi

      # Requires CLOUDFLARE_ZONE_ID and CLOUDFLARE_API_TOKEN secrets to be set in the repository/environment.
      - name: Purge Cloudflare cache
        if: success()
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | jq '.success'
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  notify-failure:
    name: Notify Deploy Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = `[Deploy Failure] ${context.sha.substring(0, 7)} — Run #${context.runNumber}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-failure',
              per_page: 10
            });
            const existing = issues.data.find(i => i.title.startsWith('[Deploy Failure]'));
            if (existing) {
              core.notice(`Deploy failure detected, existing issue: ${existing.html_url}`);
              return;
            }
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `Production deploy failed.\n\n**Commit:** \`${context.sha}\`\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate and close this issue once resolved.`,
              labels: ['deploy-failure', 'automated']
            });
            core.notice(`Created deploy failure issue: ${issue.data.html_url}`);
