name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Unit Tests (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vaultlister_test
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-min-32-chars-xxxxxxxx
      OAUTH_ENCRYPTION_KEY: test-encryption-key-min-32-chars-xx

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initialize test database
        run: bun run db:init

      - name: Run unit tests
        run: bun run test:unit

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy app service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project 73f90c33-83db-4301-a138-b5ca5a2c8de4 --environment production --service b7f36b13-dfff-44ea-a90c-783cef01057f
          railway redeploy --yes || echo "No existing deployment to redeploy — Railway will auto-deploy from GitHub source"

      - name: Deploy worker service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project 73f90c33-83db-4301-a138-b5ca5a2c8de4 --environment production --service 4f9e776c-0a96-41bd-9749-a23eec55a8b0
          railway redeploy --yes || echo "No existing deployment to redeploy — Railway will auto-deploy from GitHub source"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        run: echo "Deployed ${{ github.sha }} to Railway"

      - name: Notify on failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "Deploy failed — see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
