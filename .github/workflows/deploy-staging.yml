name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  STAGING_IMAGE_TAG: vaultlister:staging

jobs:
  # ============================================================
  # Gate: CI must pass before any build or deploy step runs.
  # On workflow_dispatch from the staging branch this check is
  # advisory (no prior CI run exists); on push it is blocking.
  # ============================================================
  build-and-push:
    name: Build and Push Staging Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Bump SW cache version with git SHA
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          sed -i "s/const CACHE_VERSION = '.*'/const CACHE_VERSION = 'v4.3-${SHORT_SHA}'/" public/sw.js
          sed -i "s|// VaultLister Service Worker v.*|// VaultLister Service Worker v4.3-${SHORT_SHA}|" public/sw.js

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_ENV=staging

      # Create GitHub deployment record — status set to "in_progress"
      - name: Create GitHub deployment
        id: create-deployment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'staging',
              description: 'Staging deploy triggered by push to staging branch',
              auto_merge: false,
              required_contexts: []
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Mark deployment in_progress
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Building and pushing Docker image'
            });

    outputs:
      deployment_id: ${{ steps.create-deployment.outputs.deployment_id }}
      image_tag: ${{ steps.meta.outputs.tags }}

  # ============================================================
  # Deploy: SSH into staging server, pull image, restart stack,
  # run health-check smoke test.
  # ============================================================
  deploy:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.STAGING_HOST }}" ]; then echo "ERROR: STAGING_HOST secret not set"; exit 1; fi
          if [ -z "${{ secrets.STAGING_USER }}" ]; then echo "ERROR: STAGING_USER secret not set"; exit 1; fi
          if [ -z "${{ secrets.STAGING_SSH_KEY }}" ]; then echo "ERROR: STAGING_SSH_KEY secret not set"; exit 1; fi

      - name: Checkout (for compose file)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directory and .env
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} 'bash -s' << 'EOF'
          mkdir -p /opt/vaultlister-staging
          if [ ! -f /opt/vaultlister-staging/.env ]; then
            echo "JWT_SECRET=$(openssl rand -hex 32)" > /opt/vaultlister-staging/.env
            echo "NODE_ENV=staging" >> /opt/vaultlister-staging/.env
            echo "PORT=3000" >> /opt/vaultlister-staging/.env
            echo "DATA_DIR=/app/data" >> /opt/vaultlister-staging/.env
            echo "Created .env with generated secrets"
          fi
          EOF

      - name: Copy docker-compose file to server
        run: scp docker-compose.staging.yml ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/vaultlister-staging/docker-compose.staging.yml

      - name: Copy nginx config to server
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} 'mkdir -p /opt/vaultlister-staging/nginx'
          scp nginx/nginx.staging.conf ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/vaultlister-staging/nginx/nginx.staging.conf

      - name: Copy backup script to server
        run: |
          scp scripts/backup.sh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/vaultlister-staging/backup.sh
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} 'chmod +x /opt/vaultlister-staging/backup.sh'

      - name: Pre-deploy database backup
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} '/opt/vaultlister-staging/backup.sh || echo "Backup skipped (first deploy or no DB yet)"'

      - name: Deploy via SSH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Write token to temp file on server (avoids shell escaping issues with JWT chars)
          printf '%s' "$GH_TOKEN" | ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} 'cat > /tmp/.gh_token && chmod 600 /tmp/.gh_token'

          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} 'bash -s' << 'DEPLOY'
          set -e
          cd /opt/vaultlister-staging

          GH_TOKEN=$(cat /tmp/.gh_token)
          rm -f /tmp/.gh_token

          echo "$GH_TOKEN" | docker login ghcr.io -u "Vaultifacts" --password-stdin

          # Tag current image for rollback
          CURRENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' vaultlister-staging-app 2>/dev/null || echo "")
          if [ -n "$CURRENT_IMAGE" ]; then
            docker tag "$CURRENT_IMAGE" "${CURRENT_IMAGE%%:*}:staging-rollback" 2>/dev/null || true
            echo "Tagged rollback: $CURRENT_IMAGE"
          fi

          # Pull and restart app + redis (nginx config is copied above; start nginx if present)
          docker compose -f docker-compose.staging.yml pull app
          docker compose -f docker-compose.staging.yml up -d --no-deps redis
          docker compose -f docker-compose.staging.yml up -d --no-deps app

          # Wait for container health check (up to 90s)
          HEALTHY=false
          for i in $(seq 1 18); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' vaultlister-staging-app 2>/dev/null || echo "starting")
            echo "Health status attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              HEALTHY=true
              break
            fi
            sleep 5
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "ERROR: Container health check failed"
            docker logs vaultlister-staging-app --tail 50
            exit 1
          fi

          echo "Deploy complete — container is healthy"
          docker image prune -f
          DEPLOY

      # --------------------------------------------------------
      # Smoke test: curl health endpoint from inside the server
      # (avoids Oracle Cloud firewall on non-standard ports)
      # --------------------------------------------------------
      - name: Smoke test — health endpoint via SSH
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} 'bash -s' << 'SMOKE'
          set -e
          PASSED=false
          for i in $(seq 1 6); do
            HTTP_STATUS=$(curl -o /dev/null -sw "%{http_code}" \
              "http://localhost:3000/api/health" \
              --connect-timeout 10 --max-time 15 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Smoke test passed (attempt $i) — HTTP $HTTP_STATUS"
              PASSED=true
              break
            fi
            echo "Smoke test attempt $i: HTTP $HTTP_STATUS — retrying in 10s"
            sleep 10
          done
          if [ "$PASSED" != "true" ]; then
            echo "ERROR: Smoke test failed after all retries"
            docker logs vaultlister-staging-app --tail 30
            exit 1
          fi
          SMOKE

      - name: Full smoke test suite
        if: success()
        run: |
          scp scripts/smoke-test-staging.sh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/tmp/smoke-test.sh
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} 'chmod +x /tmp/smoke-test.sh && /tmp/smoke-test.sh https://vaultlister.com && rm /tmp/smoke-test.sh'

      - name: Rollback on smoke test failure
        if: failure()
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} 'bash -s' << 'ROLLBACK'
          set -e
          echo "Smoke test failed — executing rollback"
          /opt/vaultlister-staging/rollback.sh
          ROLLBACK

      - name: Mark deployment success
        if: success()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.build-and-push.outputs.deployment_id }},
              state: 'success',
              environment_url: 'http://${{ secrets.STAGING_HOST }}:3001',
              description: 'Staging deployment successful'
            });

      - name: Mark deployment failure
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.build-and-push.outputs.deployment_id }},
              state: 'failure',
              description: 'Staging deployment failed — check Actions run for details'
            });

      - name: Write deploy summary
        if: always()
        run: |
          STATUS=${{ job.status }}
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "## Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | ${TIMESTAMP} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [View run](${RUN_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recent Commits" >> $GITHUB_STEP_SUMMARY
          git log --oneline -5 >> $GITHUB_STEP_SUMMARY
