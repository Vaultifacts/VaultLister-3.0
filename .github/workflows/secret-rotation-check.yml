name: Secret Rotation Check

on:
  schedule:
    - cron: '0 9 1 * *'  # 9 AM UTC on the 1st of every month
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  check-secret-ages:
    name: Check secret ages and flag stale secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch secret metadata from GitHub API
        id: fetch-secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "=== Fetching GitHub Actions secret metadata ==="

          # Fetch all secrets metadata (names + updated_at only — values are never exposed)
          SECRETS_JSON=$(gh api "repos/${{ github.repository }}/actions/secrets" --paginate \
            --jq '[.secrets[] | {name: .name, updated_at: .updated_at}]')

          echo "secrets_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SECRETS_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "Fetched $(echo "$SECRETS_JSON" | jq 'length') secrets"

      - name: Evaluate secret ages and build report
        id: evaluate
        env:
          SECRETS_JSON: ${{ steps.fetch-secrets.outputs.secrets_json }}
        run: |
          set -euo pipefail

          NOW_EPOCH=$(date +%s)

          # Rotation thresholds per secret name (days)
          # Format: SECRET_NAME=DAYS
          declare -A THRESHOLDS=(
            # Auth secrets — 90 days
            [JWT_SECRET]=90
            [SESSION_SECRET]=90
            [BACKUP_CODE_SECRET]=90
            [UNSUBSCRIBE_SECRET]=90
            [OAUTH_ENCRYPTION_KEY]=90
            [EBAY_DELETION_VERIFICATION_TOKEN]=90

            # AWS credentials — 90 days
            [AWS_ACCESS_KEY_ID]=90
            [AWS_SECRET_ACCESS_KEY]=90

            # Stripe — 180 days
            [STRIPE_SECRET_KEY]=180
            [STRIPE_WEBHOOK_SECRET]=180

            # AI service keys — 180 days
            [ANTHROPIC_API_KEY]=180
            [OPENAI_API_KEY]=180
            [XAI_API_KEY]=180

            # Email — 180 days
            [RESEND_API_KEY]=180

            # OAuth secrets (eBay, Depop, Google, Outlook) — 180 days
            [EBAY_CLIENT_SECRET]=180
            [DEPOP_CLIENT_SECRET]=180
            [GOOGLE_CLIENT_SECRET]=180
            [OUTLOOK_CLIENT_SECRET]=180
            [SHOPIFY_ACCESS_TOKEN]=180
            [SHOPIFY_CLIENT_SECRET]=180
            [ETSY_CLIENT_SECRET]=180
            [GRAILED_CLIENT_SECRET]=180
            [WHATNOT_CLIENT_SECRET]=180
            [MERCARI_CLIENT_SECRET]=180
            [POSHMARK_CLIENT_SECRET]=180
            [DEPOP_WEBHOOK_SECRET]=180

            # Cloudflare R2 — 180 days
            [R2_ACCESS_KEY_ID]=180
            [R2_SECRET_ACCESS_KEY]=180

            # Backblaze B2 — 180 days
            [B2_APPLICATION_KEY_ID]=180
            [B2_APPLICATION_KEY]=180

            # Firebase — 180 days
            [FIREBASE_PRIVATE_KEY]=180

            # Betterstack — 180 days
            [BETTERSTACK_SOURCE_TOKEN]=180

            # Sentry DSN — 365 days (rarely needs rotation)
            [SENTRY_DSN]=365
          )

          STALE_ROWS=""
          STALE_COUNT=0

          while IFS= read -r secret_json; do
            NAME=$(echo "$secret_json" | jq -r '.name')
            UPDATED_AT=$(echo "$secret_json" | jq -r '.updated_at')

            # Parse updated_at to epoch
            UPDATED_EPOCH=$(date -d "$UPDATED_AT" +%s 2>/dev/null || echo "0")
            DAYS_OLD=$(( (NOW_EPOCH - UPDATED_EPOCH) / 86400 ))

            # Look up threshold for this secret (default 180 if not in our list)
            THRESHOLD="${THRESHOLDS[$NAME]:-180}"

            if [ "$DAYS_OLD" -ge "$THRESHOLD" ]; then
              STALE_COUNT=$((STALE_COUNT + 1))
              STALE_ROWS="${STALE_ROWS}| \`${NAME}\` | ${DAYS_OLD} | ${THRESHOLD} | Rotate now — ${DAYS_OLD} days old (threshold: ${THRESHOLD} days) |\n"
              echo "STALE: $NAME — ${DAYS_OLD} days old (threshold: ${THRESHOLD})"
            else
              echo "OK:    $NAME — ${DAYS_OLD} days old (threshold: ${THRESHOLD})"
            fi
          done < <(echo "$SECRETS_JSON" | jq -c '.[]')

          echo "stale_count=$STALE_COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "stale_rows<<EOF"
            printf "%b" "$STALE_ROWS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "=== Summary: $STALE_COUNT secret(s) need rotation ==="

      - name: Check for existing open secret-rotation issue
        id: existing-issue
        if: steps.evaluate.outputs.stale_count != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'secret-rotation',
              per_page: 50
            });

            const existing = issues.data.find(i => !i.pull_request);

            if (existing) {
              console.log(`Existing open secret-rotation issue: #${existing.number} ${existing.html_url}`);
              core.setOutput('exists', 'true');
              core.setOutput('issue_number', String(existing.number));
              core.setOutput('issue_url', existing.html_url);
            } else {
              console.log('No existing open secret-rotation issue found');
              core.setOutput('exists', 'false');
            }

      - name: Create secret rotation issue
        id: create-issue
        if: >
          steps.evaluate.outputs.stale_count != '0' &&
          steps.existing-issue.outputs.exists == 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          STALE_ROWS: ${{ steps.evaluate.outputs.stale_rows }}
          STALE_COUNT: ${{ steps.evaluate.outputs.stale_count }}
        with:
          script: |
            const staleCount = process.env.STALE_COUNT;
            const staleRows  = process.env.STALE_ROWS;
            const now        = new Date().toUTCString();
            const runUrl     = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `[Security] ${staleCount} secret(s) need rotation — ${new Date().toISOString().slice(0, 7)}`;

            const body = [
              '## Secret Rotation Required',
              '',
              `**${staleCount} GitHub Actions secret(s)** have exceeded their recommended rotation interval and should be rotated.`,
              '',
              '> **Note:** This issue lists secret *names* and *ages* only — actual secret values are never exposed by this workflow.',
              '',
              '## Secrets Needing Rotation',
              '',
              '| Secret Name | Days Since Last Rotation | Rotation Interval | Recommended Action |',
              '|-------------|--------------------------|-------------------|--------------------|',
              staleRows.trimEnd(),
              '',
              '## How to Rotate',
              '',
              '1. Generate a new secret value (e.g. `openssl rand -hex 32` for symmetric keys)',
              '2. Update the secret in **Settings > Secrets and variables > Actions**',
              '3. Update the same value in Railway environment variables (for runtime secrets)',
              '4. Test that the service still works after rotation',
              '5. Close this issue once all secrets above have been rotated',
              '',
              '## Rotation Intervals Reference',
              '',
              '| Category | Interval |',
              '|----------|----------|',
              '| `JWT_SECRET`, `SESSION_SECRET`, `AWS_ACCESS_KEY_ID/SECRET` | 90 days |',
              '| `STRIPE_*`, `ANTHROPIC_API_KEY`, `OPENAI_API_KEY`, `RESEND_API_KEY`, OAuth secrets, R2/B2 keys | 180 days |',
              '| `SENTRY_DSN` | 365 days |',
              '',
              '---',
              '',
              `*Detected at ${now}. [View workflow run](${runUrl})*`
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'secret-rotation', 'automated']
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
            core.setOutput('issue_url', issue.data.html_url);

      - name: Update existing secret rotation issue
        id: update-issue
        if: >
          steps.evaluate.outputs.stale_count != '0' &&
          steps.existing-issue.outputs.exists == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          STALE_ROWS:   ${{ steps.evaluate.outputs.stale_rows }}
          STALE_COUNT:  ${{ steps.evaluate.outputs.stale_count }}
          ISSUE_NUMBER: ${{ steps.existing-issue.outputs.issue_number }}
        with:
          script: |
            const staleCount  = process.env.STALE_COUNT;
            const staleRows   = process.env.STALE_ROWS;
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            const now         = new Date().toUTCString();
            const runUrl      = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const comment = [
              `### Monthly re-check — ${new Date().toISOString().slice(0, 7)}`,
              '',
              `**${staleCount} secret(s) still need rotation** as of ${now}.`,
              '',
              '| Secret Name | Days Since Last Rotation | Rotation Interval | Recommended Action |',
              '|-------------|--------------------------|-------------------|--------------------|',
              staleRows.trimEnd(),
              '',
              `*[View workflow run](${runUrl})*`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            console.log(`Added re-check comment to issue #${issueNumber}`);

      - name: No stale secrets — log result
        if: steps.evaluate.outputs.stale_count == '0'
        run: |
          echo "=== All secrets are within their rotation intervals. No issue created. ==="
