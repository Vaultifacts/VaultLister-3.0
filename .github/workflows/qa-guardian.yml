name: QA Guardian

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run nightly at 6 AM UTC to catch environment drift
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: qa-guardian-${{ github.ref }}
  cancel-in-progress: true

env:
  DISABLE_CSRF: true
  DISABLE_RATE_LIMIT: true
  NODE_ENV: test
  JWT_SECRET: ci-test-secret-do-not-use-in-production
  PORT: '3001'
  TEST_BASE_URL: http://localhost:3001

jobs:
  unit-tests:
    name: Unit Tests (Guardian Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initialize database
        run: |
          bun run db:init
          bun run db:seed

      - name: Start server
        run: |
          bun run start &
          for i in $(seq 1 30); do curl -sf http://localhost:$PORT/api/health > /dev/null && break; sleep 1; done
          curl -sf http://localhost:$PORT/api/health > /dev/null || { echo "Server failed to start"; exit 1; }

      - name: Run unit tests
        run: |
          set +e
          bun test src/tests/ 2>&1 | tee /tmp/test-output.txt
          TEST_EXIT=$?
          set -e

          if [ $TEST_EXIT -eq 0 ]; then
            echo "All tests passed!"
          else
            # Use same regression detection as ci.yml
            KNOWN_FAIL_NAMES=$(grep -v '^\s*#' .test-baseline | grep '^KNOWN_FAIL: ' | sed 's/^KNOWN_FAIL: //' || true)
            ACTUAL_FAIL_NAMES=$(grep '^(fail) ' /tmp/test-output.txt | sed 's/^(fail) //' || true)

            REGRESSIONS=""
            while IFS= read -r fail_name; do
              [ -z "$fail_name" ] && continue
              if ! echo "$KNOWN_FAIL_NAMES" | grep -qxF "$fail_name"; then
                REGRESSIONS="${REGRESSIONS}  REGRESSION: ${fail_name}"$'\n'
              fi
            done <<< "$ACTUAL_FAIL_NAMES"

            KNOWN_FAILURES=$(grep -v '^\s*#' .test-baseline | grep -oP 'KNOWN_FAILURES=\K\d+' | head -1)
            KNOWN_FAILURES=${KNOWN_FAILURES:-0}
            ACTUAL_FAILURES=$(grep -oP '\d+ fail' /tmp/test-output.txt | grep -oP '^\d+' | head -1)
            ACTUAL_FAILURES=${ACTUAL_FAILURES:-999}

            if [ -n "$REGRESSIONS" ]; then
              echo "::error::New test regressions detected:"
              echo "$REGRESSIONS"
              exit 1
            elif [ "$ACTUAL_FAILURES" -le "$KNOWN_FAILURES" ]; then
              echo "::warning::$ACTUAL_FAILURES test failure(s) — all are known pre-existing failures"
            else
              echo "::warning::$ACTUAL_FAILURES test failure(s) exceeds baseline of $KNOWN_FAILURES (no named regressions — update KNOWN_FAILURES in .test-baseline)"
            fi
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 7

  guardian-e2e:
    name: QA Guardian E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Setup Node.js (for Playwright)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Initialize database
        run: |
          bun run db:init
          bun run db:seed

      - name: Start server and wait for ready
        run: |
          PORT=3001 DISABLE_CSRF=true DISABLE_RATE_LIMIT=true bun run start &
          for i in $(seq 1 30); do curl -sf http://localhost:3001/api/health > /dev/null && break; sleep 1; done
          curl -sf http://localhost:3001/api/health > /dev/null || { echo "Server failed to start"; exit 1; }

      - name: Run QA Guardian specs
        run: npx playwright test --grep @quinn-v3-guardian --project=chromium --workers=1
        env:
          PORT: '3001'
          DISABLE_CSRF: true
          DISABLE_RATE_LIMIT: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-guardian-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upload visual baseline screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-guardian-screenshots
          path: e2e/tests/qa-guardian.spec.js-snapshots/
          retention-days: 30
