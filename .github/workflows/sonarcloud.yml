# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow helps you trigger a SonarCloud analysis of your code and populates
# GitHub Code Scanning alerts with the vulnerabilities found.
# Free for open source project.

# 1. Login to SonarCloud.io using your GitHub account

# 2. Import your project on SonarCloud
#     * Add your GitHub organization first, then add your repository as a new project.
#     * Please note that many languages are eligible for automatic analysis,
#       which means that the analysis will start automatically without the need to set up GitHub Actions.
#     * This behavior can be changed in Administration > Analysis Method.
#
# 3. Follow the SonarCloud in-product tutorial
#     * a. Copy/paste the Project Key and the Organization Key into the args parameter below
#          (You'll find this information in SonarCloud. Click on "Information" at the bottom left)
#
#     * b. Generate a new token and add it to your Github repository's secrets using the name SONAR_TOKEN
#          (On SonarCloud, click on your avatar on top-right > My account > Security
#           or go directly to https://sonarcloud.io/account/security/)

# Feel free to take a look at our documentation (https://docs.sonarcloud.io/getting-started/github/)
# or reach out to our community forum if you need some help (https://community.sonarsource.com/c/help/sc/9)

name: SonarCloud analysis

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: "7 9 * * *"

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:
  Analysis:
    runs-on: ubuntu-latest

    env:
      DISABLE_CSRF: true
      DISABLE_RATE_LIMIT: true
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      PORT: '3000'
      TEST_BASE_URL: http://localhost:3000
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vaultlister_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history required for SonarCloud

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read project version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set SonarCloud previous-version baseline
        if: github.event_name != 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: Vaultifacts_VaultLister-3.0
        run: |
          curl -fsS --header "Authorization: Bearer ${SONAR_TOKEN}" \
            --data-urlencode "component=${SONAR_PROJECT_KEY}" \
            --data-urlencode "key=sonar.leak.period" \
            --data-urlencode "value=previous_version" \
            https://sonarcloud.io/api/settings/set
          curl -fsS --header "Authorization: Bearer ${SONAR_TOKEN}" \
            --data-urlencode "component=${SONAR_PROJECT_KEY}" \
            --data-urlencode "key=sonar.leak.period.type" \
            --data-urlencode "value=previous_version" \
            https://sonarcloud.io/api/settings/set

      - name: Configure quality gate
        if: github.event_name != 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          ORG: vaultlister
        run: |
          API="https://sonarcloud.io/api"
          AUTH="Authorization: Bearer ${SONAR_TOKEN}"
          GATE_NAME="VaultLister"
          PROJECT_KEY="Vaultifacts_VaultLister-3.0"

          # Find or create quality gate
          GATE_ID=$(curl -sS -H "$AUTH" \
            "${API}/qualitygates/list?organization=${ORG}" | \
            jq -r ".qualitygates[] | select(.name == \"${GATE_NAME}\") | .id")

          if [ -z "$GATE_ID" ]; then
            echo "Creating quality gate '${GATE_NAME}'..."
            GATE_ID=$(curl -sS -H "$AUTH" \
              -d "name=${GATE_NAME}&organization=${ORG}" \
              "${API}/qualitygates/create" | jq -r '.id')
          fi

          if [ -z "$GATE_ID" ] || [ "$GATE_ID" = "null" ]; then
            echo "WARNING: Could not create/find quality gate — skipping"
            exit 0
          fi
          echo "Quality gate ID: ${GATE_ID}"

          # Remove existing conditions to reset cleanly
          EXISTING=$(curl -sS -H "$AUTH" \
            "${API}/qualitygates/show?id=${GATE_ID}&organization=${ORG}" | \
            jq -r '.conditions[]?.id // empty')
          for CID in $EXISTING; do
            curl -sS -H "$AUTH" \
              -d "id=${CID}&organization=${ORG}" \
              "${API}/qualitygates/delete_condition" > /dev/null 2>&1 || true
          done

          # Add realistic conditions for new code period
          add_condition() {
            echo "  Adding condition: $1 $2 $3"
            RESP=$(curl -sS -H "$AUTH" \
              -d "gateId=${GATE_ID}&metric=$1&op=$2&error=$3&organization=${ORG}" \
              "${API}/qualitygates/create_condition" 2>&1)
            echo "    -> $RESP"
          }
          add_condition "new_coverage"              "LT" "5"
          add_condition "new_duplicated_lines_density" "GT" "10"
          add_condition "new_security_rating"        "GT" "2"
          add_condition "new_reliability_rating"     "GT" "3"
          add_condition "new_maintainability_rating" "GT" "2"

          # Gate selection is done via scanner property -Dsonar.qualitygate.name
          echo "Quality gate '${GATE_NAME}' (ID: ${GATE_ID}) configured with 5 conditions"

      - name: Initialize database
        run: |
          bun run db:init
          bun run db:seed

      - name: Start server
        run: |
          bun run start &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/api/health > /dev/null && break; sleep 1; done
          curl -sf http://localhost:3000/api/health > /dev/null || { echo "Server failed to start"; exit 1; }

      - name: Run tests with LCOV coverage
        continue-on-error: true  # Known pre-existing failures — coverage still generates
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage src/tests/

      - name: Analyze with SonarCloud
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}  # nosemgrep
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectVersion=${{ steps.package-version.outputs.version }}
            -Dsonar.qualitygate.name=VaultLister
