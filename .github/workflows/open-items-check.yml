name: Open Items Check

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/superpowers/plans/**'
      - 'docs/walkthrough/**'
      - 'docs/open-items/**'
      - 'docs/reference/deep-dive-backlog.md'
      - 'docs/COMPETITOR_GAP_INVENTORY_2026-04-19.md'
      - 'docs/PERFECT_ANTI_DETECTION_SYSTEM.md'
      - 'docs/FACEBOOK_OAUTH_COMPLIANCE.md'
      - 'memory/project_automation_roadmap.md'
      - 'scripts/generate-open-items.mjs'
  pull_request:
    paths:
      - 'docs/superpowers/plans/**'
      - 'docs/walkthrough/**'
      - 'docs/open-items/**'
      - 'docs/reference/deep-dive-backlog.md'
      - 'docs/COMPETITOR_GAP_INVENTORY_2026-04-19.md'
      - 'docs/PERFECT_ANTI_DETECTION_SYSTEM.md'
      - 'docs/FACEBOOK_OAUTH_COMPLIANCE.md'
      - 'memory/project_automation_roadmap.md'
      - 'scripts/generate-open-items.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Verify OPEN_ITEMS.md is current
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Check open items is current
        run: bun run open-items:check
