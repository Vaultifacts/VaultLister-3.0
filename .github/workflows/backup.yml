name: Daily Database Backup

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:      # allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  backup:
    name: PostgreSQL Backup to B2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install PostgreSQL 18 client tools
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
          CLOUD_BACKUP_ENABLED: 'true'
        run: bun scripts/pg-backup.js --compress

  notify-failure:
    name: Notify Backup Failure
    runs-on: ubuntu-latest
    needs: [backup]
    if: failure()
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = `[Backup Failure] Daily database backup — Run #${context.runNumber}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'backup-failure',
              per_page: 10
            });
            const existing = issues.data.find(i => i.title.startsWith('[Backup Failure] Daily database backup'));
            if (existing) {
              core.notice(`Backup failure detected, existing issue: ${existing.html_url}`);
              return;
            }
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Daily production database backup failed.\n\n**Commit:** \`${context.sha}\`\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nInvestigate the backup logs and close this issue once a successful backup has run.`,
              labels: ['backup-failure', 'automated']
            });
            core.notice(`Created backup failure issue: ${issue.data.html_url}`);
