name: CI

on:
  push:
    branches: [main, master, feature/postgres-migration]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  JWT_SECRET: ci-test-secret-do-not-use-in-production
  PORT: '3000'
  TEST_BASE_URL: http://localhost:3000

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Cache Bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check JavaScript syntax
        run: |
          # Use bun build --no-bundle to validate syntax without producing output.
          # node --check hangs on ESM files with Bun-specific imports (bun:test).
          SYNTAX_OUTPUT=$(find src -name "*.js" -not -path "*/node_modules/*" | xargs bun build --no-bundle --outdir /dev/null 2>&1 || true)
          if echo "$SYNTAX_OUTPUT" | grep -qi "error"; then
            echo "::error::Syntax errors detected:"
            echo "$SYNTAX_OUTPUT"
            exit 1
          fi
          echo "Syntax check passed"

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DISABLE_CSRF: 'true'
      DISABLE_RATE_LIMIT: 'true'
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vaultlister_test
        options: >-
          --health-cmd "pg_isready -U vaultlister"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Cache Bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U vaultlister && break
            sleep 2
          done

      - name: Initialize database
        run: bun run db:init

      - name: Seed test data
        run: bun run db:seed

      - name: Start server
        run: |
          bun run start &
          SERVER_PID=$!
          echo "Waiting for server (PID $SERVER_PID) to become ready..."
          TIMEOUT=60
          for i in $(seq 1 $TIMEOUT); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::error::Server process exited unexpectedly"
              exit 1
            fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/health > /dev/null || { echo "::error::Server failed to start within ${TIMEOUT}s"; exit 1; }

      - name: Run unit tests with coverage
        run: |
          set +e
          bun test --coverage src/tests/ 2>&1 | tee /tmp/test-output.txt
          TEST_EXIT=$?
          set -e

          if [ $TEST_EXIT -eq 0 ]; then
            echo "All tests passed!"
          else
            # ── Name-based regression detection (Q22) ────────────────────────
            # Extract KNOWN_FAIL entries from .test-baseline (lines starting with "KNOWN_FAIL: ")
            KNOWN_FAIL_NAMES=$(grep -v '^\s*#' .test-baseline | grep '^KNOWN_FAIL: ' | sed 's/^KNOWN_FAIL: //' || true)

            # Extract actual failing test names from bun:test output (lines starting with "(fail) ")
            ACTUAL_FAIL_NAMES=$(grep '^(fail) ' /tmp/test-output.txt | sed 's/^(fail) //' || true)

            # Find regressions: failures NOT in the known list
            REGRESSIONS=""
            while IFS= read -r fail_name; do
              [ -z "$fail_name" ] && continue
              if ! echo "$KNOWN_FAIL_NAMES" | grep -qxF "$fail_name"; then
                REGRESSIONS="${REGRESSIONS}  REGRESSION: ${fail_name}"$'\n'
              fi
            done <<< "$ACTUAL_FAIL_NAMES"

            # Count totals for reporting
            KNOWN_FAILURES=$(grep -v '^\s*#' .test-baseline | grep -oP 'KNOWN_FAILURES=\K\d+' | head -1)
            KNOWN_FAILURES=${KNOWN_FAILURES:-0}
            ACTUAL_FAILURES=$(grep -oP '\d+ fail' /tmp/test-output.txt | grep -oP '^\d+' | head -1)
            ACTUAL_FAILURES=${ACTUAL_FAILURES:-999}

            if [ -n "$REGRESSIONS" ]; then
              echo "::error::New test regressions detected (not in .test-baseline KNOWN_FAIL list):"
              echo "$REGRESSIONS"
              echo "Add to .test-baseline with 'KNOWN_FAIL: <test name>' if pre-existing, or fix the regression."
              exit 1
            elif [ "$ACTUAL_FAILURES" -le "$KNOWN_FAILURES" ]; then
              echo "::warning::$ACTUAL_FAILURES test failure(s) — all are known pre-existing failures"
            else
              echo "::error::$ACTUAL_FAILURES test failure(s) exceeds count baseline of $KNOWN_FAILURES (but no named regressions found — update KNOWN_FAILURES in .test-baseline)"
              exit 1
            fi
          fi

          # Check coverage thresholds
          LINE_COV=$(grep 'All files' /tmp/test-output.txt | grep -oP '\d+\.\d+' | tail -1)
          FUNC_COV=$(grep 'All files' /tmp/test-output.txt | grep -oP '\d+\.\d+' | head -1)
          echo "Coverage: Functions=${FUNC_COV}% Lines=${LINE_COV}%"

          # Enforce minimum 60% line coverage
          if [ -n "$LINE_COV" ]; then
            THRESHOLD=60
            if [ "$(echo "$LINE_COV < $THRESHOLD" | bc)" -eq 1 ]; then
              echo "::error::Line coverage ${LINE_COV}% is below ${THRESHOLD}% threshold"
              exit 1
            fi
            echo "Line coverage ${LINE_COV}% meets ${THRESHOLD}% threshold"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 7

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # To temporarily disable E2E in CI (e.g. during a Playwright infrastructure issue),
    # change the condition below to: if: false
    # Re-enable by restoring: if: github.event_name == 'push' || github.event_name == 'pull_request'
    if: false
    needs: [test-unit]
    continue-on-error: true
    env:
      DISABLE_CSRF: 'true'
      DISABLE_RATE_LIMIT: 'true'
      FEATURE_AI_LISTING: 'true'
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vaultlister_test
        options: >-
          --health-cmd "pg_isready -U vaultlister"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Setup Node.js (for Playwright)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Cache Bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U vaultlister && break
            sleep 2
          done

      - name: Initialize database
        run: bun run db:init

      - name: Seed test data
        run: bun run db:seed

      - name: Build frontend chunks
        run: bun run build

      - name: Start server and wait for ready
        run: |
          bun run start &
          SERVER_PID=$!
          echo "Waiting for server (PID $SERVER_PID) to become ready..."
          TIMEOUT=60
          for i in $(seq 1 $TIMEOUT); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::error::Server process exited unexpectedly"
              exit 1
            fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/health > /dev/null || { echo "::error::Server failed to start within ${TIMEOUT}s"; exit 1; }

      - name: Run E2E tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security-scan:
    # NOTE: This job intentionally does NOT set DISABLE_CSRF or DISABLE_RATE_LIMIT.
    # It is the CI gate that verifies CSRF protection and rate limiting are enforced.
    # test-unit and test-e2e disable these for test isolation; regressions are caught here.
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vaultlister_test
        options: >-
          --health-cmd "pg_isready -U vaultlister"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Cache Bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security tests
        run: |
          bun run db:init
          bun run db:seed
          bun run start &
          SERVER_PID=$!
          echo "Waiting for server (PID $SERVER_PID) to become ready..."
          TIMEOUT=60
          for i in $(seq 1 $TIMEOUT); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::error::Server process exited unexpectedly"
              exit 1
            fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/health > /dev/null || { echo "::error::Server failed to start within ${TIMEOUT}s"; exit 1; }

          set +e
          bun test src/tests/security.test.js 2>&1 | tee /tmp/security-output.txt
          SECURITY_EXIT=$?
          set -e

          if [ $SECURITY_EXIT -eq 0 ]; then
            echo "All security tests passed!"
          else
            KNOWN_FAIL_NAMES=$(grep -v '^\s*#' .test-baseline | grep '^KNOWN_FAIL: ' | sed 's/^KNOWN_FAIL: //' || true)
            ACTUAL_FAIL_NAMES=$(grep '^(fail) ' /tmp/security-output.txt | sed 's/^(fail) //' || true)
            REGRESSIONS=""
            while IFS= read -r fail_name; do
              [ -z "$fail_name" ] && continue
              fail_name_stripped=$(printf '%s' "$fail_name" | sed 's/ \[[0-9][0-9.]*ms\]$//')
              if ! printf '%s\n' "$KNOWN_FAIL_NAMES" | grep -qxF "$fail_name_stripped"; then
                REGRESSIONS="${REGRESSIONS}  REGRESSION: ${fail_name}"$'\n'
              fi
            done <<< "$ACTUAL_FAIL_NAMES"
            if [ -n "$REGRESSIONS" ]; then
              echo "::error::New security regressions (not in .test-baseline KNOWN_FAIL list):"
              printf '%s' "$REGRESSIONS"
              exit 1
            fi
            echo "Security tests: known pre-existing failures only — no new regressions"
          fi

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "password\s*=\s*['\"][^'\"]*['\"]" src/ --include="*.js" | grep -v "password.*=.*body" | grep -v "password.*=.*formData" | grep -v "password.*=.*process.env" | grep -v "test" | grep -v "demo" | grep -v "placeholder" | grep -v "TODO"; then
            echo "::error::Potential hardcoded secrets found"
            exit 1
          fi
          echo "No hardcoded secrets found"

      - name: Run security audit
        run: bun run scripts/security-audit.js || echo "Security audit completed with warnings"

  dep-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Generate package-lock and audit
        run: |
          npm install --package-lock-only --ignore-scripts
          npm audit --audit-level=high

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker build -t vaultlister:ci .

      - name: Check Docker image size
        run: |
          SIZE=$(docker image inspect vaultlister:ci --format '{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 600 ]; then
            echo "ERROR: Image exceeds 600MB limit (${SIZE_MB}MB)"
            exit 1
          fi

  accessibility-audit:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Cache Bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run accessibility audit
        run: bun run scripts/accessibility-audit.js || echo "::warning::Accessibility audit found issues (see above)"

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: accessibility-report
          path: accessibility-report.json
          retention-days: 7

  visual-tests:
    name: Visual Tests (Shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vaultlister_test
        options: >-
          --health-cmd "pg_isready -U vaultlister"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Setup Node.js (visual-test.js requires Node)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Cache Bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U vaultlister && break
            sleep 2
          done

      - name: Initialize database
        run: |
          bun run db:init
          bun run db:seed

      - name: Start server and wait for ready
        run: |
          bun run start &
          SERVER_PID=$!
          echo "Waiting for server (PID $SERVER_PID) to become ready..."
          TIMEOUT=60
          for i in $(seq 1 $TIMEOUT); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::error::Server process exited unexpectedly"
              exit 1
            fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/health > /dev/null || { echo "::error::Server failed to start within ${TIMEOUT}s"; exit 1; }

      - name: Run visual tests (shard ${{ matrix.shard }}/3)
        run: |
          set +e
          node scripts/visual-test.js run-suite tests/visual/ --shard ${{ matrix.shard }}/3 2>&1 | tee /tmp/visual-output.txt
          set -e

          # Extract pass/fail counts
          PASSED=$(grep -oP '\d+ passed' /tmp/visual-output.txt | grep -oP '^\d+' | head -1)
          FAILED=$(grep -oP '\d+ failed' /tmp/visual-output.txt | grep -oP '^\d+' | head -1)
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          TOTAL=$((PASSED + FAILED))

          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(echo "scale=1; $PASSED * 100 / $TOTAL" | bc)
            echo "Visual test pass rate (shard ${{ matrix.shard }}): ${RATE}% ($PASSED/$TOTAL)"
          fi

          # Warn but don't fail — visual tests are advisory
          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED visual test(s) failed in shard ${{ matrix.shard }}"
          fi

      - name: Upload visual test screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: visual-test-screenshots-shard-${{ matrix.shard }}
          path: screenshots/
          retention-days: 7

  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test-unit]
    env:
      DATABASE_URL: postgres://vaultlister:testpassword@localhost:5432/vaultlister_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vaultlister
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vaultlister_test
        options: >-
          --health-cmd "pg_isready -U vaultlister"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Cache Bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U vaultlister && break
            sleep 2
          done

      - name: Initialize database
        run: |
          bun run db:init
          bun run db:seed

      - name: Start server and wait for ready
        run: |
          bun run start &
          SERVER_PID=$!
          echo "Waiting for server (PID $SERVER_PID) to become ready..."
          TIMEOUT=60
          for i in $(seq 1 $TIMEOUT); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::error::Server process exited unexpectedly"
              exit 1
            fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/health > /dev/null || { echo "::error::Server failed to start within ${TIMEOUT}s"; exit 1; }

      - name: Run load test (baseline)
        run: |
          CONCURRENT_USERS=10 REQUESTS_PER_USER=5 bun run scripts/load-test.js | tee /tmp/load-test-output.txt
        env:
          BASE_URL: http://localhost:3000

      - name: Check response time threshold
        run: |
          echo "Load test results:"
          cat /tmp/load-test-output.txt

          P95=$(grep -oP 'p95:\s+\K\d+' /tmp/load-test-output.txt | head -1)
          if [ -n "$P95" ]; then
            P95_THRESHOLD=2000
            echo "p95 latency: ${P95}ms (threshold: ${P95_THRESHOLD}ms)"
            if [ "$P95" -gt "$P95_THRESHOLD" ]; then
              echo "::error::p95 latency ${P95}ms exceeds ${P95_THRESHOLD}ms threshold"
              exit 1
            fi
            echo "p95 latency within threshold"
          else
            echo "::warning::No p95 data found in load test output — skipping threshold check"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Cache Bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Check build size
        run: |
          BUILD_SIZE=$(stat -c%s dist/app.js)
          MAX_SIZE=3145728
          echo "Build size: ${BUILD_SIZE} bytes ($(( BUILD_SIZE / 1024 )) KB)"
          echo "Threshold: ${MAX_SIZE} bytes (3 MB)"
          if [ "$BUILD_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::Build size ${BUILD_SIZE} exceeds 3 MB threshold"
            exit 1
          fi
          echo "Build size within threshold"

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/
          retention-days: 30
