name: Bot Scheduler Reminders & Validation

# Items: 10 (poshmark-scheduler), 11 (poshmark-offer-sync), 12 (poshmark-publish-bot),
#         13 (poshmark-diagnose), 14 (check-publish-credentials), 15 (test-publish-automation)

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6 AM UTC weekly — credential + dry-run validation
  workflow_dispatch:
    inputs:
      run_diagnose:
        description: 'Run poshmark-diagnose (set to true after bot failure)'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write

jobs:
  credential-validation:
    name: Weekly Credential Validation & Dry-Run
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Railway cron reminder — poshmark-scheduler (Item 10)
        run: |
          echo "=== Railway Cron Reminder: poshmark-scheduler ==="
          echo "scripts/poshmark-scheduler.js handles closet sharing automation."
          echo "Ensure Railway cron is configured: e.g. '0 */6 * * *' (every 6 hours)"
          echo "Configure at: https://railway.app/project/73f90c33-83db-4301-a138-b5ca5a2c8de4"
          if [ -f scripts/poshmark-scheduler.js ]; then
            echo "poshmark-scheduler.js EXISTS"
          else
            echo "::warning::scripts/poshmark-scheduler.js NOT FOUND"
          fi

      - name: Railway cron reminder — poshmark-offer-sync (Item 11)
        run: |
          echo "=== Railway Cron Reminder: poshmark-offer-sync ==="
          echo "scripts/poshmark-offer-sync.mjs syncs Poshmark offers to the database."
          echo "Ensure Railway cron is configured: e.g. '*/30 * * * *' (every 30 minutes)"
          if [ -f scripts/poshmark-offer-sync.mjs ]; then
            echo "poshmark-offer-sync.mjs EXISTS"
          else
            echo "::warning::scripts/poshmark-offer-sync.mjs NOT FOUND"
          fi

      - name: Railway cron reminder — poshmark-publish-bot (Item 12)
        run: |
          echo "=== Railway Cron Reminder: poshmark-publish-bot ==="
          echo "scripts/poshmark-publish-bot.js publishes pending listings to Poshmark."
          echo "Ensure Railway cron is configured: e.g. '0 * * * *' (hourly)"
          if [ -f scripts/poshmark-publish-bot.js ]; then
            echo "poshmark-publish-bot.js EXISTS"
          else
            echo "::warning::scripts/poshmark-publish-bot.js NOT FOUND"
          fi

      - name: Check publish credentials (Item 14)
        env:
          POSHMARK_USERNAME:    ${{ secrets.POSHMARK_USERNAME }}
          POSHMARK_EMAIL:       ${{ secrets.POSHMARK_EMAIL }}
          POSHMARK_PASSWORD:    ${{ secrets.POSHMARK_PASSWORD }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
        run: |
          echo "=== Weekly Publish Credential Validation ==="
          if [ -f scripts/check-publish-credentials.js ]; then
            node scripts/check-publish-credentials.js || {
              echo "::warning::check-publish-credentials.js reported missing or invalid credentials"
            }
          else
            # Fallback: check that at least the key secrets are set
            MISSING=""
            for VAR in POSHMARK_USERNAME POSHMARK_EMAIL POSHMARK_PASSWORD DATABASE_URL; do
              VAL=$(printenv "$VAR" || true)
              if [ -z "$VAL" ]; then
                MISSING="${MISSING} ${VAR}"
              fi
            done
            if [ -n "$MISSING" ]; then
              echo "::warning::Missing bot credentials:${MISSING}"
            else
              echo "All checked bot credentials are set"
            fi
          fi

      - name: Dry-run publish automation test (Item 15)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: 'true'
        run: |
          echo "=== Weekly Publish Automation Dry-Run ==="
          if [ -f scripts/test-publish-automation.js ]; then
            node scripts/test-publish-automation.js || {
              echo "::warning::test-publish-automation.js dry-run reported issues"
            }
          else
            echo "::notice::scripts/test-publish-automation.js not found — skipping dry-run"
          fi

  bot-failure-diagnose:
    name: Poshmark Bot Failure Diagnostics (Item 13)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_diagnose == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Node.js (Playwright requires Node)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run poshmark-diagnose
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          POSHMARK_USERNAME: ${{ secrets.POSHMARK_USERNAME }}
          POSHMARK_EMAIL:    ${{ secrets.POSHMARK_EMAIL }}
          POSHMARK_PASSWORD: ${{ secrets.POSHMARK_PASSWORD }}
        run: |
          echo "=== Poshmark Bot Diagnostics ==="
          if [ -f scripts/poshmark-diagnose.mjs ]; then
            bun scripts/poshmark-diagnose.mjs || {
              echo "::warning::poshmark-diagnose.mjs reported issues — review output above"
            }
          else
            echo "::warning::scripts/poshmark-diagnose.mjs not found"
          fi
