<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback - VaultLister</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            opacity: 0.95;
            margin: 0;
            line-height: 1.5;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease-out;
        }

        .error {
            background: rgba(220, 38, 38, 0.2);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 16px;
            border: 2px solid rgba(220, 38, 38, 0.4);
        }

        .error-icon {
            font-size: 60px;
            margin-bottom: 16px;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .countdown {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="spinner"></div>
        <h1>Completing OAuth...</h1>
        <p>Please wait while we connect your account</p>
    </div>

    <script>
        (async function() {
            try {
                // Get parameters from URL
                const params = new URLSearchParams(window.location.search);
                const code = params.get('code');
                const state = params.get('state');
                const error = params.get('error');
                const errorDescription = params.get('error_description');

                // Handle OAuth errors
                if (error) {
                    throw new Error(errorDescription || (error === 'access_denied' ? 'Authorization cancelled' : 'OAuth error: ' + error));
                }

                if (!code || !state) {
                    throw new Error('Missing authorization code or state parameter');
                }

                // Determine platform from the URL path or referrer
                const platform = getPlatformFromContext();

                if (!platform) {
                    throw new Error('Unable to determine platform');
                }

                // Call backend callback endpoint
                const response = await fetch(`/api/oauth/callback/${platform}?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`, {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || data.details || 'OAuth callback failed');
                }

                // Success! Notify parent window
                if (window.opener) {
                    // Send postMessage to opener
                    window.opener.postMessage({
                        type: 'oauth_complete',
                        platform: platform,
                        success: true,
                        data: data
                    }, window.location.origin);

                    // Also dispatch custom event
                    const event = new CustomEvent('oauthComplete', {
                        detail: {
                            platform: platform,
                            success: true,
                            data: data
                        }
                    });
                    window.opener.dispatchEvent(event);
                }

                // Show success message
                document.getElementById('content').innerHTML = `
                    <div class="success-icon">✓</div>
                    <h1>Connection Successful!</h1>
                    <p>Your ${platform.charAt(0).toUpperCase() + platform.slice(1)} account has been connected.</p>
                    <p class="countdown">This window will close in <span id="countdown">2</span> seconds...</p>
                `;

                // Countdown and close
                let countdown = 2;
                const countdownEl = document.getElementById('countdown');
                const interval = setInterval(() => {
                    countdown--;
                    if (countdownEl) {
                        countdownEl.textContent = countdown;
                    }
                    if (countdown <= 0) {
                        clearInterval(interval);
                        window.close();
                    }
                }, 1000);

            } catch (error) {
                console.error('OAuth callback error:', error);

                // Notify parent window of error
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'oauth_complete',
                        success: false,
                        error: error.message
                    }, window.location.origin);

                    const event = new CustomEvent('oauthComplete', {
                        detail: {
                            success: false,
                            error: error.message
                        }
                    });
                    window.opener.dispatchEvent(event);
                }

                // Show error message (use DOM construction to avoid XSS)
                const content = document.getElementById('content');
                content.textContent = '';
                const errDiv = document.createElement('div');
                errDiv.className = 'error';
                errDiv.innerHTML = '<div class="error-icon">\u2717</div><h1>Connection Failed</h1>';
                const errP = document.createElement('p');
                errP.textContent = error.message;
                errDiv.appendChild(errP);
                const closeP = document.createElement('p');
                closeP.className = 'countdown';
                closeP.style.cssText = 'opacity: 0.7; margin-top: 16px;';
                closeP.textContent = 'You can close this window';
                errDiv.appendChild(closeP);
                content.appendChild(errDiv);

                // Auto-close after 5 seconds on error
                setTimeout(() => {
                    window.close();
                }, 5000);
            }

            /**
             * Determine the platform from various context clues
             */
            function getPlatformFromContext() {
                // Try to get platform from state token (if encoded)
                const params = new URLSearchParams(window.location.search);
                const state = params.get('state');

                // Check if state contains platform hint
                if (state && state.includes('_')) {
                    const parts = state.split('_');
                    for (const part of parts) {
                        if (isPlatform(part)) {
                            return part;
                        }
                    }
                }

                // Check URL path
                const pathMatch = window.location.pathname.match(/\/(poshmark|ebay|mercari|depop|grailed|facebook)/);
                if (pathMatch) {
                    return pathMatch[1];
                }

                // Check referrer
                const referrer = document.referrer;
                if (referrer) {
                    for (const platform of ['poshmark', 'ebay', 'mercari', 'depop', 'grailed', 'facebook']) {
                        if (referrer.includes(platform)) {
                            return platform;
                        }
                    }
                }

                // Check query parameters for platform hint
                const platformParam = params.get('platform');
                if (platformParam && isPlatform(platformParam)) {
                    return platformParam;
                }

                // Default to checking all known platforms in authorization URL
                const authUrl = window.location.href;
                for (const platform of ['poshmark', 'ebay', 'mercari', 'depop', 'grailed', 'facebook']) {
                    if (authUrl.includes(platform)) {
                        return platform;
                    }
                }

                return null;
            }

            function isPlatform(str) {
                const platforms = ['poshmark', 'ebay', 'mercari', 'depop', 'grailed', 'facebook'];
                return platforms.includes(str.toLowerCase());
            }
        })();
    </script>
</body>
</html>
