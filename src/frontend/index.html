<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <meta name="description" content="VaultLister - All-in-one multi-channel reselling platform for cross-listing, inventory management, and reseller automation.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VaultLister">
    <meta name="application-name" content="VaultLister">
    <meta name="format-detection" content="telephone=no">

    <title>VaultLister - Multi-Channel Reselling Platform</title>
    <link rel="canonical" href="https://vaultlister.com/"> <!-- nosemgrep: html.security.audit.missing-integrity.missing-integrity -->

    <!-- Open Graph meta tags -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vaultlister.com/">
    <meta property="og:title" content="VaultLister - Multi-Channel Reselling Platform">
    <meta property="og:description" content="Zero-cost, offline-capable multi-channel reselling platform. List to 9 marketplaces at launch, manage inventory, and automate reseller workflows with AI-powered tools.">
    <meta property="og:image" content="https://vaultlister.com/assets/og-image.png">
    <meta property="og:site_name" content="VaultLister">

    <!-- Twitter Card meta tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@VaultLister">
    <meta name="twitter:title" content="VaultLister - Multi-Channel Reselling Platform">
    <meta name="twitter:description" content="Zero-cost, offline-capable multi-channel reselling platform. List to 9 marketplaces at launch, manage inventory, and automate reseller workflows with AI-powered tools.">
    <meta name="twitter:image" content="https://vaultlister.com/assets/og-image.png">

    <!-- Preconnect to API origin to reduce DNS + TLS handshake latency -->
    <link rel="preconnect" href="https://vaultlister.com">
    <link rel="dns-prefetch" href="https://vaultlister.com">
    <link rel="preconnect" href="https://www.googletagmanager.com">

    <!-- Google Analytics (GA4) with Consent Mode -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LXETN4PYRM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      // Default: deny analytics until user consents
      gtag('consent', 'default', {
        analytics_storage: localStorage.getItem('cookie_consent') === 'accepted' ? 'granted' : 'denied'
      });
      gtag('js', new Date());
      gtag('config', 'G-LXETN4PYRM');
    </script>

    <!-- Preload critical CSS and JS so they start fetching ASAP -->
    <link rel="preload" href="/styles/main.css?v=c10c8876" as="style">
    <link rel="preload" href="/core-bundle.js?v=c10c8876" as="script">
    <!-- Fonts: preload+onload makes inter.css non-render-blocking (FOUT acceptable) -->
    <link rel="preload" href="/fonts/inter.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/fonts/inter.css"></noscript>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="64x64" href="/assets/logo/Favicon/favicon-64.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/logo/Favicon/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo/Favicon/apple-touch-icon.png">

    <!-- Styles -->
    <link rel="stylesheet" href="/styles/main.css?v=c10c8876">

    <!-- Component Scripts -->
    <script src="/components/photoEditor.js?v=c10c8876" defer></script>
    <script src="/components/chatWidget.js?v=c10c8876" defer></script>

    <!-- WebSocket Client (must load before app.js for window.VaultListerSocket) -->
    <script type="module" src="/services/websocketClient.js?v=c10c8876" defer></script>

    <!-- DOMPurify — must load before core bundle for sanitizeHTML() -->
    <!-- defer is safe: defer scripts execute in document order, so DOMPurify runs before core-bundle.js -->
    <script src="/dompurify.min.js" defer></script>

    <!-- Sentry Browser SDK (loaded only if DSN meta tag is present) -->
    <script src="https://browser.sentry-cdn.com/8.0.0/bundle.min.js" crossorigin="anonymous" defer></script>
    <meta name="sentry-dsn" content="">

    <!-- Phase 1: Core bundle (all critical-path scripts concatenated) -->
    <script src="/core-bundle.js?v=c10c8876" defer></script>
    <!-- Phase 2: Route-group chunks loaded on demand by router.js -->
</head>
<body>
    <!-- App Shell -->
    <main id="app"></main>

    <!-- Loading Screen (outside #app so renderApp can't accidentally destroy it) -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-content">
                <div class="loading-logo">
                    <img src="/assets/logo/icon/icon-64.png" width="64" height="64" alt="VaultLister logo">
                </div>
                <h1 class="loading-title">VaultLister</h1>
                <div class="loading-spinner"></div>
                <p class="loading-text">Loading your closet...</p>
        </div>
    </div>

    <!-- Fail-safe: catches stuck loading screen AND blank white screen -->
    <script>
        (function() {
            var appRendered = false;

            // Mark app as rendered when initApp succeeds (called from app.js)
            window.__markAppRendered = function() { appRendered = true; };

            // Catch fatal JS errors (syntax errors, module load failures)
            var fatalError = null;
            window.addEventListener('error', function(e) {
                if (e.filename && (e.filename.indexOf('/core/') !== -1 || e.filename.indexOf('/ui/') !== -1 || e.filename.indexOf('/pages/') !== -1 || e.filename.indexOf('/handlers/') !== -1 || e.filename.indexOf('/init.js') !== -1 || e.filename.indexOf('app.js') !== -1)) {
                    fatalError = e.message || 'Script error';
                }
            });

            function hideLoading() {
                var ls = document.getElementById('loading-screen');
                if (ls) { ls.classList.add('hidden'); ls.remove(); }
                if (window.__loadingTimeout) { clearTimeout(window.__loadingTimeout); window.__loadingTimeout = null; }
            }

            function showRecovery() {
                hideLoading();
                var app = document.getElementById('app');
                if (!app || app.innerHTML.trim().length > 50) return; // Already has content
                app.innerHTML =
                    '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,system-ui,sans-serif;background:#f9fafb;">' +
                        '<div style="text-align:center;max-width:400px;padding:2rem;">' +
                            '<img src=\"/assets/logo/icon/icon-64.png\" width=\"64\" height=\"64\" alt=\"VaultLister logo\" style=\"margin:0 auto 1rem;display:block;border-radius:16px;\">' +
                            '<h2 style="margin:0 0 0.5rem;color:#111827;font-size:1.25rem;">VaultLister failed to load</h2>' +
                            '<p style="color:#6b7280;font-size:0.9rem;margin:0 0 1.5rem;">' + (fatalError || 'The app took too long to start or encountered an error.') + '</p>' +
                            '<button onclick="location.reload()" style="background:#f59e0b;color:#fff;border:none;padding:0.625rem 1.5rem;border-radius:0.5rem;font-size:0.9rem;cursor:pointer;font-weight:600;">Reload Page</button>' +
                        '</div>' +
                    '</div>';
            }

            // Primary fail-safe: 6 seconds
            window.__loadingTimeout = setTimeout(function() {
                if (!appRendered) showRecovery(); else hideLoading();
            }, 6000);

            // Secondary fail-safe: after page fully loads + 3 more seconds
            window.addEventListener('load', function() {
                setTimeout(function() {
                    if (!appRendered) showRecovery(); else hideLoading();
                }, 3000);
            });
        })();
    </script>

    <!-- System Announcement Banner -->
    <div id="announcement-banner" class="announcement-banner" role="alert" aria-live="polite" aria-label="System announcement" hidden>
        <span class="announcement-banner-icon" aria-hidden="true">&#128226;</span>
        <span class="announcement-banner-text" id="announcement-banner-text"></span>
        <button class="announcement-banner-close" id="announcement-banner-close" aria-label="Dismiss announcement" type="button" onclick="document.getElementById('announcement-banner').hidden=true">&#10005;</button>
    </div>

    <!-- Navigation Progress Bar -->
    <div id="nav-progress-bar" class="nav-progress-bar" role="progressbar" aria-label="Page loading" aria-hidden="true"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container" role="region" aria-label="Notifications" aria-live="polite" data-testid="toast-container"></div>

    <!-- Modal Container -->
    <div id="modal-container" data-testid="modal-container"></div>

    <!-- Offline Indicator -->
    <div id="offline-indicator" class="offline-indicator hidden" data-testid="offline-indicator">
        <span class="offline-icon">📡</span>
        <span>You're offline. Changes will sync when you reconnect.</span>
    </div>

    <!-- WebSocket Connection Status Dot -->
    <div id="ws-status-dot" class="ws-status-dot ws-status-dot--connected" aria-label="WebSocket connected" role="status" title="Connected"></div>

    <!-- Voice Command Indicator -->
    <div id="voice-indicator" class="voice-indicator hidden">
        <div class="voice-pulse"></div>
        <span>Listening...</span>
    </div>

    <!-- Chat Widget Container -->
    <div id="chat-widget-container"></div>

    <!-- OAuth popup callback — reload when the callback page signals via localStorage -->
    <script>
        window.addEventListener('storage', function(e) {
            if (e.key === 'oauth_complete') {
                localStorage.removeItem('oauth_complete');
                location.reload();
            }
        });
    </script>

    <!-- Auto-update: detect new deploys and reload seamlessly -->
    <script>
        (function() {
            var currentVersion = null;
            setInterval(function() {
                fetch('/api/health', { cache: 'no-store' })
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        if (!currentVersion) { currentVersion = d.version || d.timestamp; return; }
                        // If SW updated, force reload
                        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                            navigator.serviceWorker.controller.postMessage({ type: 'CHECK_UPDATE' });
                        }
                    })
                    .catch(function() {});
            }, 60000);
            // Listen for SW update notification
            if (navigator.serviceWorker) {
                navigator.serviceWorker.addEventListener('controllerchange', function() {
                    if (currentVersion) location.reload();
                });
            }
        })();
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>

    <!-- Cookie Consent Banner -->
    <div id="cookie-banner" role="dialog" aria-modal="false" aria-label="Cookie consent" aria-describedby="cookie-banner-desc" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#18181B;color:#fef3c7;padding:1rem 1.5rem;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;box-shadow:0 -2px 16px rgba(0,0,0,0.18);font-family:Inter,system-ui,sans-serif;font-size:0.9rem;"></div>
    <script>
        (function() {
            var existing = localStorage.getItem('cookie_consent');
            window.__cookieConsentGiven = existing === 'accepted';

            var banner = document.getElementById('cookie-banner');
            if (!banner || existing || localStorage.getItem('cookie_consent_shown')) return;

            localStorage.setItem('cookie_consent_shown', '1');

            var desc = document.createElement('p');
            desc.id = 'cookie-banner-desc';
            desc.style.cssText = 'margin:0;flex:1;min-width:200px;';
            var strong = document.createElement('strong');
            strong.textContent = 'Cookie preferences.';
            var text = document.createTextNode(' We use essential cookies to keep you signed in and analytics cookies (Google Analytics) to understand how visitors use VaultLister. ');
            var link = document.createElement('a');
            link.href = '#privacy-policy';
            link.style.cssText = 'color:#fcd34d;text-decoration:underline;';
            link.setAttribute('tabindex', '0');
            link.textContent = 'Learn more';
            desc.appendChild(strong);
            desc.appendChild(text);
            desc.appendChild(link);

            var btnRow = document.createElement('div');
            btnRow.style.cssText = 'display:flex;gap:0.625rem;flex-shrink:0;';

            var btnDecline = document.createElement('button');
            btnDecline.id = 'cookie-decline';
            btnDecline.setAttribute('aria-label', 'Decline non-essential cookies');
            btnDecline.style.cssText = 'min-height:44px;padding:0.5rem 1.125rem;border-radius:0.5rem;border:1.5px solid rgba(224,231,255,0.4);background:transparent;color:#fef3c7;font-size:0.875rem;font-weight:600;cursor:pointer;';
            btnDecline.textContent = 'Decline';

            var btnManage = document.createElement('button');
            btnManage.id = 'cookie-manage';
            btnManage.setAttribute('aria-label', 'Manage cookie preferences');
            btnManage.style.cssText = 'min-height:44px;padding:0.5rem 1.125rem;border-radius:0.5rem;border:1.5px solid rgba(224,231,255,0.4);background:transparent;color:#aaa;font-size:0.875rem;font-weight:600;cursor:pointer;';
            btnManage.textContent = 'Manage Preferences';

            var btnAccept = document.createElement('button');
            btnAccept.id = 'cookie-accept';
            btnAccept.setAttribute('aria-label', 'Accept all cookies');
            btnAccept.style.cssText = 'min-height:44px;padding:0.5rem 1.25rem;border-radius:0.5rem;border:none;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:0.875rem;font-weight:600;cursor:pointer;';
            btnAccept.textContent = 'Accept All';

            btnRow.appendChild(btnDecline);
            btnRow.appendChild(btnManage);
            btnRow.appendChild(btnAccept);
            banner.appendChild(desc);
            banner.appendChild(btnRow);
            banner.style.display = 'flex';

            btnAccept.addEventListener('click', function() {
                localStorage.setItem('cookie_consent', 'accepted');
                window.__cookieConsentGiven = true;
                if (typeof gtag === 'function') gtag('consent', 'update', { analytics_storage: 'granted' });
                banner.style.display = 'none';
                banner.setAttribute('aria-hidden', 'true');
            });
            btnDecline.addEventListener('click', function() {
                localStorage.setItem('cookie_consent', 'declined');
                window.__cookieConsentGiven = false;
                if (typeof gtag === 'function') gtag('consent', 'update', { analytics_storage: 'denied' });
                banner.style.display = 'none';
                banner.setAttribute('aria-hidden', 'true');
            });
            btnManage.addEventListener('click', function() {
                banner.style.display = 'none';
                banner.setAttribute('aria-hidden', 'true');
                if (typeof handlers !== 'undefined') {
                    handlers.showCookieConsent();
                } else {
                    window.addEventListener('vaultlister:ready', function() {
                        if (typeof handlers !== 'undefined') handlers.showCookieConsent();
                    }, { once: true });
                }
            });

            setTimeout(function() { btnAccept.focus(); }, 100);
        })();
    </script>
</body>
</html>
